integrationproviders:
    aws:
        active: true
        authType: aws_sts
        category: cloud
        credentialsSchema:
            additionalProperties: false
            allOf:
                - if:
                    properties:
                        accountScope:
                            const: specific
                    required:
                        - accountScope
                  then:
                    required:
                        - accountIds
            properties:
                accessKeyId:
                    description: Optional source credential key when Openlane cannot use runtime IAM credentials.
                    title: Access Key ID
                    type: string
                accountId:
                    description: Optional AWS account identifier for reference.
                    title: Account ID
                    type: string
                accountIds:
                    description: Required when Account Scope is set to specific.
                    items:
                        type: string
                    title: Account IDs
                    type: array
                accountScope:
                    default: all
                    description: Use all accessible accounts from the delegated admin role, or limit to specific account IDs.
                    enum:
                        - all
                        - specific
                    title: Account Scope
                    type: string
                alias:
                    description: Friendly identifier for this AWS integration.
                    title: Credential Alias
                    type: string
                externalId:
                    description: External ID required in the tenant role trust policy to prevent confused deputy attacks.
                    title: External ID
                    type: string
                homeRegion:
                    default: us-east-1
                    description: Primary AWS region where Security Hub aggregation is managed.
                    title: Security Hub Home Region
                    type: string
                linkedRegions:
                    description: Optional list of regions to filter findings by region.
                    items:
                        type: string
                    title: Linked Regions
                    type: array
                organizationId:
                    description: Optional AWS Organizations identifier (for traceability and scoping).
                    title: AWS Organization ID
                    type: string
                region:
                    default: us-east-1
                    description: Legacy alias for home region; use Security Hub Home Region when possible.
                    title: AWS Region (Legacy)
                    type: string
                roleArn:
                    description: Cross-account role Openlane should assume in the tenant environment.
                    title: IAM Role ARN
                    type: string
                secretAccessKey:
                    description: Optional source credential secret paired with Access Key ID.
                    secret: true
                    title: Secret Access Key
                    type: string
                sessionDuration:
                    description: Optional session duration (Go duration string, e.g. 1h30m).
                    title: Session Duration
                    type: string
                sessionName:
                    description: Optional session name override for STS AssumeRole calls.
                    title: Session Name
                    type: string
                sessionToken:
                    description: Optional source session token when using temporary source credentials.
                    secret: true
                    title: Session Token
                    type: string
                tags:
                    additionalProperties:
                        type: string
                    description: Optional key/value map added to generated integrations for traceability.
                    title: Default Tags
                    type: object
            required:
                - roleArn
                - externalId
                - homeRegion
            type: object
        description: Collect AWS security and compliance findings and posture from Security Hub and Audit Manager data.
