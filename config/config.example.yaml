            additionalProperties: false
            properties:
                accountId:
                    description: Cloudflare account identifier targeted by this integration.
                    title: Account ID
                    type: string
                alias:
                    description: Friendly identifier for this Cloudflare account.
                    title: Credential Alias
                    type: string
                apiKey:
                    description: Optional global API key when using email/key authentication instead of scoped tokens.
                    title: Global API Key
                    type: string
                apiToken:
                    description: Scoped token with access to account settings, Zero Trust policies, and scanning features.
                    title: API Token
                    type: string
                email:
                    description: Optional email associated with the API token (required for legacy key authentication).
                    title: Account Email
                    type: string
                enableScanner:
                    default: false
                    description: Toggle Cloudflare's scanning utility if the account is licensed for it.
                    title: Enable Scanner
                    type: boolean
                scannerLabel:
                    description: Optional label recorded with scan jobs for traceability.
                    title: Scanner Label
                    type: string
                zoneIds:
                    description: Optional subset of zones to include when collecting findings.
                    items:
                        type: string
                    title: Zone IDs
                    type: array
