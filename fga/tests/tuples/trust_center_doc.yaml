- user: organization:tc-org-1
  relation: parent_context
  object: trust_center:tc-1
- user: user:tc-owner-1
  relation: owner
  object: organization:tc-org-1
- user: user:tc-viewer-1
  relation: member
  object: organization:tc-org-1
- user: organization:tc-org-1#member
  relation: access
  object: organization:tc-org-1
  condition:
    name: email_domains_allowed
    context:
      allowed_domains: []

# Setup public file
- user: trust_center:tc-1
  relation: parent
  object: trust_center_doc:tcdoc-1
- user: trust_center_doc:tcdoc-1
  relation: tc_doc_parent
  object: file:file-1
- user: user:*
  relation: can_view
  object: trust_center_doc:tcdoc-1

- user: user:anon_signed-nda
  relation: nda_signed
  object: trust_center:tc-1

# setup protected file that requires nda signing
- user: trust_center:tc-1
  relation: parent
  object: trust_center_doc:tcdoc-3
- user: trust_center_doc:tcdoc-3
  relation: tc_doc_parent
  object: file:file-3

# Allow public access to trust center documents (but not files)
- user: user:*
  relation: can_view
  object: trust_center:tc-1
- user: organization:tc-org-2#member
  relation: access
  object: organization:tc-org-2
  condition:
    name: email_domains_allowed
    context:
      allowed_domains: []
- user: organization:tc-org-2
  relation: parent_context
  object: trust_center:tc-2
- user: user:tc-owner-2
  relation: owner
  object: organization:tc-org-2
- user: user:tc-viewer-2
  relation: member
  object: organization:tc-org-2

- user: trust_center:tc-2
  relation: parent
  object: trust_center_doc:tcdoc-2
