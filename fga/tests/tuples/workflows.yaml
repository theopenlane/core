############################################
# Tuples for testing the FGA implementation
# This file is specific to workflow types:
#   - workflow_definition (user-managed)
#   - workflow_instance (system-driven)
#   - workflow_assignment (system-driven)
#   - workflow_object_ref (system-driven)
#   - workflow_assignment_target (system-driven)
#   - workflow_event (system-driven)
#   - workflow_proposal (system-driven)
#
# Note: Only workflow_definition has editor relations.
# All other workflow types are system-driven (only services can edit/delete).
############################################

# workflow_definition-1 is owned by openlane organization
- user: organization:openlane
  relation: parent_context
  object: workflow_definition:workflow_definition-1

- user: organization:openlane
  relation: parent_context
  object: workflow_definition:workflow_definition-2

# workflow_instance-1 is owned by openlane organization and linked to workflow_definition-1
# Note: system-driven, no editor relation - users can only view who have access to the workflow definition or parent objects of the workflow instance
- user: workflow_definition:workflow_definition-1
  relation: parent
  object: workflow_instance:workflow_instance-1

- user: workflow_definition:workflow_definition-1
  relation: parent
  object: workflow_instance:workflow_instance-2

# add control to parent to test view access to members via parent objects, e.g. all org members can view controls
# so they should also be able to see workflow instances linked to the control
- user: organization:openlane
  relation: parent_context
  object: control:control-1
- user: control:control-1
  relation: parent
  object: workflow_instance:workflow_instance-1

# workflow_assignment-1 is linked to workflow_instance-1
# Note: system-driven, no editor relation - users can only view if they have access to the workflow instance or parent objects of the workflow instance
- user: workflow_instance:workflow_instance-1
  relation: parent
  object: workflow_assignment:workflow_assignment-1

- user: workflow_instance:workflow_instance-2
  relation: parent
  object: workflow_assignment:workflow_assignment-2


# workflow_object_ref-1 is linked to workflow_instance-1
# Note: system-driven, no editor relation - users can only view if they have access to the workflow instance or parent objects of the workflow instance
- user: workflow_instance:workflow_instance-1
  relation: parent
  object: workflow_object_ref:workflow_object_ref-1

- user: workflow_instance:workflow_instance-2
  relation: parent
  object: workflow_object_ref:workflow_object_ref-2

# blocked user for workflow_object_ref
- user: user:ulid-blocked
  relation: blocked
  object: workflow_object_ref:workflow_object_ref-1

# workflow_assignment_target-1 is linked to workflow_assignment-1
# Note: system-driven, no editor relation - users can only view based on the parent object
- user: workflow_assignment:workflow_assignment-1
  relation: parent
  object: workflow_assignment_target:workflow_assignment_target-1

- user: workflow_assignment:workflow_assignment-2
  relation: parent
  object: workflow_assignment_target:workflow_assignment_target-2

# blocked user for workflow_assignment_target
- user: user:ulid-blocked
  relation: blocked
  object: workflow_assignment_target:workflow_assignment_target-1

# workflow_event-1 is linked to workflow_instance-1
# Note: system-driven, no editor relation - users can only view users can only view based on the parent object
- user: workflow_instance:workflow_instance-1
  relation: parent
  object: workflow_event:workflow_event-1

- user: workflow_instance:workflow_instance-2
  relation: parent
  object: workflow_event:workflow_event-2

# blocked user for workflow_event
- user: user:ulid-blocked
  relation: blocked
  object: workflow_event:workflow_event-1

# setup a group for workflow editor access (only applies to workflow_definition)
- user: organization:openlane
  relation: parent_context
  object: group:workflow-editors
  condition:
    name: public_group
    context:
      public: false

# setup org member but give them access via group membership
- user: user:ulid-workflow-editor
  relation: _self
  object: user:ulid-workflow-editor

- user: user:ulid-workflow-editor
  relation: member
  object: organization:openlane

- user: user:ulid-workflow-editor
  relation: member
  object: group:workflow-editors

# group editor access for workflow_definition only (system-driven types have no editor relation)
- user: group:workflow-editors#member
  relation: editor
  object: workflow_definition:workflow_definition-1

# workflow_proposal-1 is linked to workflow_object_ref-1
# Note: system-driven, no editor relation - users can only view based on the parent object object ref
- user: workflow_object_ref:workflow_object_ref-1
  relation: parent
  object: workflow_proposal:workflow_proposal-1

- user: workflow_object_ref:workflow_object_ref-2
  relation: parent
  object: workflow_proposal:workflow_proposal-2

# blocked user for workflow_proposal
- user: user:ulid-blocked
  relation: blocked
  object: workflow_proposal:workflow_proposal-1
