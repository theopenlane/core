<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Integration Test Console</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <style>
      .providers-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 1.5rem;
        width: 100%;
      }
      body {
        background: #f4f5f7;
      }
      .integration-card {
        border: 1px solid #dee2e6;
        border-radius: 10px;
        background: #fff;
        padding: 24px;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        height: 100%;
      }
      .provider-header {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      .provider-info {
        flex: 1;
        min-width: 0;
      }
      .provider-meta {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        align-items: flex-end;
        justify-content: center;
      }
      .provider-logo {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
        flex-shrink: 0;
      }
      .provider-logo img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .provider-info h3 {
        margin-bottom: 0.15rem;
      }
      .provider-actions {
        margin-top: auto;
      }
      .provider-actions .btn {
        width: 100%;
      }
      .provider-body {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .provider-connections {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .connection-card {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem;
        background: #f8fafc;
      }
      .connection-card.active {
        border-color: #0d6efd;
        background: #eff6ff;
      }
      .provider-operations {
        border-top: 1px solid #e2e8f0;
        padding-top: 0.75rem;
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .operation-heading {
        font-size: 0.9rem;
        font-weight: 600;
        color: #334155;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .operation-row {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .operation-title-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .operation-title {
        font-weight: 600;
      }
      .operation-kind {
        font-size: 0.75rem;
        background: #e2e8f0;
        border-radius: 12px;
        padding: 2px 8px;
        font-weight: 600;
        text-transform: uppercase;
        color: #475569;
      }
      .operation-controls {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .operation-controls textarea {
        font-size: 0.85rem;
      }
      .operation-hint {
        font-size: 0.8rem;
        color: #64748b;
      }
      .operation-run-btn {
        align-self: flex-start;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .docs-link {
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
      }
      .config-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1050;
        padding: 1rem;
      }
      .config-modal.show {
        display: flex;
      }
      .config-modal__dialog {
        background: #fff;
        border-radius: 12px;
        max-width: 640px;
        width: 100%;
        display: flex;
        flex-direction: column;
        max-height: 90vh;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
      }
      .config-modal__header,
      .config-modal__footer {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }
      .config-modal__footer {
        border-top: 1px solid #e2e8f0;
        border-bottom: none;
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }
      .config-modal__body {
        padding: 1.5rem;
        overflow-y: auto;
      }
      .config-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .config-form__field {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .config-form .form-text {
        font-size: 0.85rem;
      }
      .config-form__empty {
        text-align: center;
        color: #64748b;
        font-style: italic;
      }
      .config-modal__close {
        border: none;
        background: none;
        font-size: 1.25rem;
      }
      .status-connected {
        background: #d1f1e0;
        color: #0f5132;
      }
      .status-pending {
        background: #fff3cd;
        color: #664d03;
      }
      .status-errored {
        background: #f8d7da;
        color: #842029;
      }
      .status-disabled {
        background: #e2e3e5;
        color: #495057;
      }
      .status-disconnected {
        background: #e2e3e5;
        color: #495057;
      }
      .log-entry {
        padding: 8px 12px;
        margin: 4px 0;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
        font-size: 0.85rem;
      }
      .log-success {
        background: #d1f1e0;
        color: #0f5132;
      }
      .log-error {
        background: #f8d7da;
        color: #842029;
      }
      .log-info {
        background: #d7e8ff;
        color: #0b3d91;
      }
      .log-warning {
        background: #fff3cd;
        color: #664d03;
      }
      .webhook-info {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem;
        background: #f0fdf4;
        font-size: 0.85rem;
      }
      .webhook-info code {
        word-break: break-all;
      }
      .detail-panel {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem;
        background: #f8fafc;
        font-size: 0.85rem;
        max-height: 200px;
        overflow-y: auto;
      }
      .detail-panel pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container my-4">
      <div class="row">
        <div class="col-12">
          <h1 class="text-center mb-3">Integration Test Console</h1>
          <p class="text-center text-muted mb-4">
            Drive the declarative integration pipeline end-to-end against a running Openlane instance.
          </p>
          <div class="alert alert-info d-flex justify-content-between align-items-center" id="authStatus">
            <div>
              <strong>Authentication Status:</strong>
              <span id="authStatusText">Checking...</span>
            </div>
            <button class="btn btn-sm btn-outline-light d-none" id="loginButton">Login with Seeded User</button>
          </div>

          <div id="callbackNotice"></div>

          <section class="mt-4">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="mb-3">Installed Integrations</h2>
              <button class="btn btn-outline-secondary btn-sm" id="refreshIntegrations">Refresh List</button>
            </div>
            <div id="integrationsList" class="mb-4">
              <div class="text-center text-muted">No data loaded yet</div>
            </div>
          </section>

          <section class="mt-5">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="mb-3">Available Providers</h2>
              <button class="btn btn-outline-primary btn-sm" id="refreshProviders">Refresh Providers</button>
            </div>
            <div id="providersContainer" class="providers-grid">
              <div class="text-center text-muted" id="providersPlaceholder">Loading provider metadata...</div>
            </div>
          </section>

          <section class="mt-4">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="mb-3">Activity Log</h2>
              <button class="btn btn-outline-secondary btn-sm" id="clearLog">Clear Log</button>
            </div>
            <div
              id="activityLog"
              style="max-height: 400px; overflow-y: auto; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 12px;"
            ></div>
          </section>
        </div>
      </div>
    </div>

    <div class="config-modal" id="configModal" aria-hidden="true">
      <div class="config-modal__dialog">
        <div class="config-modal__header d-flex justify-content-between align-items-center">
          <div>
            <h5 class="mb-0" id="configModalTitle">Configure Provider</h5>
            <small class="text-muted" id="configModalSubtitle"></small>
          </div>
          <button class="config-modal__close" id="configModalClose" aria-label="Close">&times;</button>
        </div>
        <div class="config-modal__body">
          <div id="configEditorContainer"></div>
        </div>
        <div class="config-modal__footer">
          <button class="btn btn-outline-secondary" id="configModalCancel">Cancel</button>
          <button class="btn btn-primary" id="configModalSubmit">Submit Configuration</button>
        </div>
      </div>
    </div>

    <script>
      const apiBase = "http://localhost:17608";
      let authToken = null;
      let userInfo = null;

      // provider definitions keyed by definition ID
      const providerDefinitions = new Map();

      // installed integrations keyed by definition ID -> integration record
      const installedIntegrations = new Map();

      // modal state
      let activeConfigDefinitionID = null;
      let activeCredentialRef = null;
      let activeCredentialSchema = null;
      let configModalForm = null;

      const safeDomId = (value) => value.replace(/[^a-z0-9_-]/gi, "_");
      const toTitleCase = (value = "") =>
        value
          .toString()
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\b\w/g, (char) => char.toUpperCase());

      // -----------------------------------------------------------------------
      // Logging
      // -----------------------------------------------------------------------
      function log(message, type = "info") {
        const container = document.getElementById("activityLog");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
      }

      function logJSON(label, data, type = "info") {
        log(`${label}: ${JSON.stringify(data, null, 2)}`, type);
      }

      // -----------------------------------------------------------------------
      // HTTP helpers
      // -----------------------------------------------------------------------
      function getCSRFToken() {
        const cookieName = "ol.csrf-token";
        return document.cookie
          .split(";")
          .map((c) => c.trim().split("="))
          .find(([name]) => name === cookieName)?.[1] || null;
      }

      async function makeRequest(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        const method = (options.method || "GET").toUpperCase();
        if (authToken) {
          headers["Authorization"] = `Bearer ${authToken}`;
        }
        if (method !== "GET" && !path.includes("/login")) {
          const csrf = getCSRFToken();
          if (csrf) {
            headers["X-CSRF-Token"] = csrf;
          }
        }
        return fetch(`${apiBase}${path}`, {
          ...options,
          method,
          headers,
          credentials: "include",
        });
      }

      // -----------------------------------------------------------------------
      // Authentication
      // -----------------------------------------------------------------------
      async function loginWithSeedUser() {
        try {
          log("Attempting login with seeded user", "info");
          const response = await fetch(`${apiBase}/v1/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
              username: "mitb@theopenlane.io",
              password: "mattisthebest1234",
            }),
          });
          if (!response.ok) {
            log(`Login failed: ${await response.text()}`, "error");
            return false;
          }
          const data = await response.json();
          if (data.success && data.access_token) {
            authToken = data.access_token;
            log("Login successful", "success");
            return true;
          }
          log("Unexpected login response format", "error");
          return false;
        } catch (err) {
          log(`Login error: ${err.message}`, "error");
          return false;
        }
      }

      async function ensureAuthenticated() {
        try {
          const params = new URLSearchParams(window.location.search);
          const sessionToken = params.get("session");
          if (sessionToken) {
            authToken = sessionToken;
            log("Adopted session token from query param", "info");
          }

          if (!authToken) {
            const loggedIn = await loginWithSeedUser();
            if (!loggedIn) {
              document.getElementById("authStatus").className =
                "alert alert-warning d-flex justify-content-between align-items-center";
              document.getElementById("authStatusText").innerHTML =
                'Authentication required. <button class="btn btn-sm btn-primary ms-2" onclick="loginWithSeedUser().then(ok => ok && initialize())">Login</button>';
              document.getElementById("loginButton").classList.remove("d-none");
              return false;
            }
          }

          const response = await makeRequest("/query", {
            method: "POST",
            body: JSON.stringify({ query: "{ self { id displayName email } }" }),
          });
          if (!response.ok) {
            log(`Auth check failed: HTTP ${response.status}`, "error");
            return false;
          }
          const data = await response.json();
          if (!data?.data?.self) {
            log("Auth check failed: no self payload", "error");
            return false;
          }
          userInfo = data.data.self;
          document.getElementById("authStatus").className =
            "alert alert-success d-flex justify-content-between align-items-center";
          document.getElementById("authStatusText").innerHTML =
            `Authenticated as <strong>${userInfo.displayName}</strong> (${userInfo.email})`;
          document.getElementById("loginButton").classList.add("d-none");
          log(`Authenticated as ${userInfo.displayName}`, "success");
          return true;
        } catch (err) {
          log(`Auth check error: ${err.message}`, "error");
          return false;
        }
      }

      // -----------------------------------------------------------------------
      // Credential form helpers
      // -----------------------------------------------------------------------
      function inferInputType(prop = {}) {
        if (prop.type === "integer" || prop.type === "number") return "number";
        if (prop.format === "password" || prop.secret === true) return "password";
        const name = (prop.title || "").toLowerCase();
        if (name.includes("secret") || name.includes("token") || name.includes("password") || name.includes("key")) return "password";
        if (prop.format === "email") return "email";
        if (prop.format === "uri" || prop.format === "url") return "url";
        return "text";
      }

      function buildCredentialField(key, prop = {}, isRequired = false) {
        const fieldId = `config-${key}`.replace(/[^a-z0-9_-]/gi, "-");
        const labelText = prop.title || toTitleCase(key);
        if (prop.type === "boolean") {
          const wrapper = document.createElement("div");
          wrapper.className = "form-check form-switch";
          const input = document.createElement("input");
          input.type = "checkbox";
          input.className = "form-check-input";
          input.id = fieldId;
          input.name = key;
          input.dataset.field = key;
          if (prop.default !== undefined) {
            input.checked = Boolean(prop.default);
          }
          wrapper.appendChild(input);
          const label = document.createElement("label");
          label.className = "form-check-label";
          label.setAttribute("for", fieldId);
          label.textContent = labelText;
          if (isRequired) {
            const star = document.createElement("span");
            star.className = "text-danger ms-1";
            star.textContent = "*";
            label.appendChild(star);
          }
          wrapper.appendChild(label);
          if (prop.description) {
            const hint = document.createElement("small");
            hint.className = "form-text";
            hint.textContent = prop.description;
            wrapper.appendChild(hint);
          }
          return wrapper;
        }

        const wrapper = document.createElement("div");
        wrapper.className = "config-form__field";
        const label = document.createElement("label");
        label.className = "form-label fw-semibold";
        label.setAttribute("for", fieldId);
        label.textContent = labelText;
        if (isRequired) {
          const star = document.createElement("span");
          star.className = "text-danger ms-1";
          star.textContent = "*";
          label.appendChild(star);
        }
        wrapper.appendChild(label);

        let control;
        if (Array.isArray(prop.enum) && prop.enum.length) {
          control = document.createElement("select");
          control.className = "form-select";
          const placeholderOption = document.createElement("option");
          placeholderOption.value = "";
          placeholderOption.textContent = "Select value";
          if (isRequired && prop.default === undefined) {
            placeholderOption.disabled = true;
            placeholderOption.selected = true;
          }
          control.appendChild(placeholderOption);
          prop.enum.forEach((value) => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            if (prop.default === value) {
              option.selected = true;
              placeholderOption.selected = false;
            }
            control.appendChild(option);
          });
        } else if (prop.type === "array") {
          control = document.createElement("textarea");
          control.className = "form-control";
          const defaultRowCount = Array.isArray(prop.default) ? prop.default.length : 0;
          control.rows = Math.min(8, Math.max(3, defaultRowCount || 3));
          control.placeholder = "Enter one value per line";
          control.dataset.arrayField = "true";
          if (Array.isArray(prop.default)) {
            control.value = prop.default.join("\n");
          }
        } else {
          control = document.createElement("input");
          control.className = "form-control";
          control.type = inferInputType(prop);
          if (prop.default !== undefined && prop.default !== null) {
            control.value = prop.default;
          }
        }

        control.id = fieldId;
        control.name = key;
        control.dataset.field = key;
        if (control.tagName === "INPUT" && control.type === "password") {
          control.autocomplete = "new-password";
        }
        if (isRequired) {
          control.required = true;
        }
        if (!control.placeholder) {
          if (prop.example) {
            control.placeholder = prop.example;
          } else if (Array.isArray(prop.examples) && prop.examples.length) {
            control.placeholder = prop.examples[0];
          }
        }
        if (prop.minLength) control.minLength = prop.minLength;
        if (prop.maxLength) control.maxLength = prop.maxLength;
        if (prop.pattern) control.pattern = prop.pattern;
        if (prop.minimum !== undefined) control.min = prop.minimum;
        if (prop.maximum !== undefined) control.max = prop.maximum;
        if (prop.readonly || prop.readOnly) control.readOnly = true;

        wrapper.appendChild(control);

        const descriptionBits = [];
        if (prop.description) descriptionBits.push(prop.description);
        if (prop.type === "array") descriptionBits.push("Separate values with new lines.");
        if (descriptionBits.length) {
          const hint = document.createElement("small");
          hint.className = "form-text text-muted";
          hint.textContent = descriptionBits.join(" ");
          wrapper.appendChild(hint);
        }
        return wrapper;
      }

      function renderCredentialForm(schema) {
        const form = document.createElement("form");
        form.className = "config-form";
        form.id = "configModalForm";
        form.setAttribute("novalidate", "novalidate");
        const properties = schema?.properties || {};
        const keys = Object.keys(properties);
        if (keys.length === 0) {
          const empty = document.createElement("p");
          empty.className = "config-form__empty mb-0";
          empty.textContent = "This credential slot does not require inputs.";
          form.appendChild(empty);
          return form;
        }
        const requiredFields = new Set(schema.required || []);
        keys.forEach((key) => {
          form.appendChild(buildCredentialField(key, properties[key], requiredFields.has(key)));
        });
        return form;
      }

      function collectCredentialValues(form, schema) {
        const values = {};
        const properties = schema?.properties || {};
        Object.entries(properties).forEach(([key, prop]) => {
          const field = form.querySelector(`[data-field="${key}"]`);
          if (!field) return;
          if (prop.type === "boolean") {
            values[key] = field.checked;
            return;
          }
          if (prop.type === "array") {
            const raw = field.value.trim();
            if (raw) {
              const items = raw
                .split(/[\r\n,]+/)
                .map((item) => item.trim())
                .filter(Boolean);
              if (items.length > 0) {
                values[key] = items;
              }
            } else if (field.required) {
              values[key] = [];
            }
            return;
          }
          const rawValue = field.value;
          if (rawValue === "" || rawValue === undefined || rawValue === null) {
            return;
          }
          if (prop.type === "integer") {
            const parsed = parseInt(rawValue, 10);
            if (!Number.isNaN(parsed)) {
              values[key] = parsed;
            }
            return;
          }
          if (prop.type === "number") {
            const parsed = parseFloat(rawValue);
            if (!Number.isNaN(parsed)) {
              values[key] = parsed;
            }
            return;
          }
          values[key] = rawValue.trim();
        });
        return values;
      }

      // -----------------------------------------------------------------------
      // Config modal
      // -----------------------------------------------------------------------
      function openConfigModal(definitionID, credentialRef, credentialSchema) {
        const def = providerDefinitions.get(definitionID);
        if (!def) {
          log(`Definition ${definitionID} not found`, "error");
          return;
        }
        activeConfigDefinitionID = definitionID;
        activeCredentialRef = credentialRef;
        activeCredentialSchema = credentialSchema;
        const modal = document.getElementById("configModal");
        document.getElementById("configModalTitle").textContent = `Configure ${def.spec.displayName}`;
        document.getElementById("configModalSubtitle").textContent = credentialRef
          ? `Credential: ${credentialRef}`
          : "";
        const container = document.getElementById("configEditorContainer");
        container.innerHTML = "";
        configModalForm = renderCredentialForm(activeCredentialSchema);
        container.appendChild(configModalForm);
        modal.classList.add("show");
      }

      function closeConfigModal() {
        const modal = document.getElementById("configModal");
        modal.classList.remove("show");
        if (configModalForm) {
          configModalForm.remove();
          configModalForm = null;
        }
        activeConfigDefinitionID = null;
        activeCredentialRef = null;
        activeCredentialSchema = null;
      }

      async function submitConfiguration() {
        if (!activeConfigDefinitionID || !configModalForm || !activeCredentialSchema) {
          log("No provider selected for configuration", "error");
          return;
        }
        if (!configModalForm.reportValidity()) {
          log("Resolve validation errors before submitting configuration", "error");
          return;
        }
        const submitButton = document.getElementById("configModalSubmit");
        try {
          const definitionID = activeConfigDefinitionID;
          const credentialRef = activeCredentialRef;
          const body = collectCredentialValues(configModalForm, activeCredentialSchema);

          // check if there is an existing installation for this definition
          const existingIntegration = installedIntegrations.get(definitionID);
          const payload = {
            body,
            credentialRef: credentialRef || undefined,
          };
          if (existingIntegration) {
            payload.integrationId = existingIntegration.id;
          }

          if (submitButton) {
            submitButton.disabled = true;
            submitButton.textContent = "Submitting...";
          }
          log(`Submitting configuration for ${definitionID} (credentialRef: ${credentialRef || "none"})`, "info");
          const response = await makeRequest(`/v1/integrations/${definitionID}/config`, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error(await response.text());
          const result = await response.json();
          if (!result?.success) {
            throw new Error("Configuration response did not indicate success");
          }
          log(`Configuration saved: integrationId=${result.integrationId}, health=${result.healthStatus}`, "success");
          if (result.installationMetadata) {
            logJSON("Installation metadata", result.installationMetadata, "info");
          }
          if (result.webhookEndpointUrl) {
            log(`Webhook endpoint: ${result.webhookEndpointUrl}`, "info");
            log(`Webhook secret: ${result.webhookSecret}`, "warning");
          }
          closeConfigModal();
          await loadInstallations();
        } catch (err) {
          log(`Failed to save configuration: ${err.message}`, "error");
        } finally {
          if (submitButton) {
            submitButton.disabled = false;
            submitButton.textContent = "Submit Configuration";
          }
        }
      }

      // -----------------------------------------------------------------------
      // Provider status badge
      // -----------------------------------------------------------------------
      function updateProviderStatusBadge(definitionID, status) {
        const badge = document.getElementById(`${safeDomId(definitionID)}-status`);
        if (!badge) return;
        badge.className = "status-badge";
        switch (status) {
          case "CONNECTED":
            badge.classList.add("status-connected");
            badge.textContent = "Connected";
            break;
          case "PENDING":
            badge.classList.add("status-pending");
            badge.textContent = "Pending";
            break;
          case "ERRORED":
            badge.classList.add("status-errored");
            badge.textContent = "Errored";
            break;
          case "DISABLED":
            badge.classList.add("status-disabled");
            badge.textContent = "Disabled";
            break;
          default:
            badge.classList.add("status-disconnected");
            badge.textContent = "Not Installed";
        }
      }

      // -----------------------------------------------------------------------
      // Fetch providers from registry
      // -----------------------------------------------------------------------
      async function fetchProviders() {
        try {
          log("Fetching provider library", "info");
          const response = await makeRequest("/v1/integrations/providers");
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          log(`Loaded ${data.providers?.length || 0} providers`, "success");
          return data.providers || [];
        } catch (err) {
          log(`Failed to load providers: ${err.message}`, "error");
          return [];
        }
      }

      // -----------------------------------------------------------------------
      // Render provider cards
      // -----------------------------------------------------------------------
      function renderProviders(providers) {
        const container = document.getElementById("providersContainer");
        container.innerHTML = "";
        if (providers.length === 0) {
          container.innerHTML = '<div class="text-center text-muted">No providers registered</div>';
          return;
        }

        providerDefinitions.clear();
        providers
          .slice()
          .sort((a, b) => (a.spec?.displayName || "").localeCompare(b.spec?.displayName || ""))
          .forEach((definition) => {
            if (definition?.spec?.active === false) return;

            providerDefinitions.set(definition.spec.id, definition);
            const defID = definition.spec.id;
            const domID = safeDomId(defID);
            const card = document.createElement("div");
            card.className = "integration-card";

            const displayName = definition.spec.displayName || defID;
            const initials = displayName.slice(0, 2).toUpperCase();
            const logo = definition.spec.logoUrl
              ? `<div class="provider-logo"><img src="${definition.spec.logoUrl}" alt="${displayName} logo" loading="lazy" onerror="this.onerror=null;this.remove();this.parentElement.textContent='${initials}';" /></div>`
              : `<div class="provider-logo text-uppercase fw-bold">${initials}</div>`;
            const category = definition.spec.category || "Integration";
            const docsLink = definition.spec.docsUrl
              ? `<a class="btn btn-sm btn-outline-secondary docs-link" href="${definition.spec.docsUrl}" target="_blank" rel="noopener noreferrer">Docs</a>`
              : "";
            const tags = (definition.spec.tags || []).map((t) => `<span class="badge bg-light text-dark me-1">${t}</span>`).join("");

            card.innerHTML = `
              <div class="provider-header">
                ${logo}
                <div class="provider-info">
                  <h3 class="mb-1">${displayName}</h3>
                  <small class="text-muted text-uppercase">${category}</small>
                </div>
                <div class="provider-meta text-end">
                  ${docsLink}
                  <span class="status-badge status-disconnected" id="${domID}-status">Not Installed</span>
                </div>
              </div>
              <div class="provider-body">
                ${definition.spec.description ? `<small class="text-muted">${definition.spec.description}</small>` : ""}
                ${tags ? `<div>${tags}</div>` : ""}
                <small class="text-muted">Definition ID: <code>${defID}</code></small>
              </div>
              <div class="provider-connections" id="${domID}-connections"></div>
              <div class="provider-operations d-none" id="${domID}-operations"></div>
              <div class="provider-actions d-grid gap-2" id="${domID}-actions"></div>
              <div class="d-none" id="${domID}-details"></div>
            `;

            container.appendChild(card);

            const connectionsPanel = card.querySelector(`#${domID}-connections`);
            const operationsPanel = card.querySelector(`#${domID}-operations`);
            const actions = card.querySelector(`#${domID}-actions`);

            const addButton = (label, style, handler) => {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = `btn btn-${style}`;
              btn.textContent = label;
              btn.addEventListener("click", handler);
              actions.appendChild(btn);
              return btn;
            };

            // --- Connection modes ---
            if (Array.isArray(definition.connections) && definition.connections.length) {
              const heading = document.createElement("div");
              heading.className = "operation-heading mb-1";
              heading.textContent = "Connection Modes";
              connectionsPanel.appendChild(heading);

              definition.connections.forEach((conn) => {
                const connCard = document.createElement("div");
                connCard.className = "connection-card";
                const refName = conn.credentialRef || "default";
                const connName = conn.name || toTitleCase(refName);
                const connDesc = conn.description || "";
                const hasAuth = conn.auth != null;

                connCard.innerHTML = `
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <strong>${connName}</strong>
                    <span class="badge ${hasAuth ? "bg-primary" : "bg-secondary"}">${hasAuth ? "Auth Flow" : "Credential Config"}</span>
                  </div>
                  ${connDesc ? `<small class="text-muted d-block mb-2">${connDesc}</small>` : ""}
                  <small class="text-muted">credentialRef: <code>${refName}</code></small>
                `;

                const connActions = document.createElement("div");
                connActions.className = "d-flex gap-2 mt-2";

                if (hasAuth) {
                  const authBtn = document.createElement("button");
                  authBtn.type = "button";
                  authBtn.className = "btn btn-sm btn-dark";
                  authBtn.textContent = "Start Auth Flow";
                  authBtn.addEventListener("click", () => handleAuthFlow(defID, refName));
                  connActions.appendChild(authBtn);
                }

                // find matching credential registration for the schema
                const credReg = (definition.credentialRegistrations || []).find(
                  (cr) => cr.ref === refName
                );
                if (credReg?.schema) {
                  const configBtn = document.createElement("button");
                  configBtn.type = "button";
                  configBtn.className = "btn btn-sm btn-primary";
                  configBtn.textContent = "Configure Credentials";
                  configBtn.addEventListener("click", () => {
                    let schema = credReg.schema;
                    if (typeof schema === "string") {
                      try { schema = JSON.parse(schema); } catch (_) {}
                    }
                    openConfigModal(defID, refName, schema);
                  });
                  connActions.appendChild(configBtn);
                }

                connCard.appendChild(connActions);
                connectionsPanel.appendChild(connCard);
              });
            } else if (Array.isArray(definition.credentialRegistrations) && definition.credentialRegistrations.length) {
              // no connections declared but credential registrations exist: render direct config buttons
              definition.credentialRegistrations.forEach((credReg) => {
                const refName = credReg.ref || "default";
                if (credReg.schema) {
                  addButton(`Configure: ${credReg.name || refName}`, "primary", () => {
                    let schema = credReg.schema;
                    if (typeof schema === "string") {
                      try { schema = JSON.parse(schema); } catch (_) {}
                    }
                    openConfigModal(defID, refName, schema);
                  });
                }
              });
            }

            // --- Operations ---
            if (Array.isArray(definition.operations) && definition.operations.length) {
              operationsPanel.classList.remove("d-none");
              const heading = document.createElement("div");
              heading.className = "operation-heading";
              heading.textContent = "Operations";
              operationsPanel.appendChild(heading);

              definition.operations.forEach((operation) => {
                const opRow = document.createElement("div");
                opRow.className = "operation-row";

                const titleLine = document.createElement("div");
                titleLine.className = "operation-title-line";
                const title = document.createElement("div");
                title.className = "operation-title";
                title.textContent = operation.name;
                titleLine.appendChild(title);

                const policyLabel = operation.policy?.inline ? "inline" : "async";
                const kind = document.createElement("span");
                kind.className = "operation-kind";
                kind.textContent = policyLabel;
                titleLine.appendChild(kind);
                opRow.appendChild(titleLine);

                if (operation.description) {
                  const desc = document.createElement("div");
                  desc.className = "operation-hint";
                  desc.textContent = operation.description;
                  opRow.appendChild(desc);
                }

                const controls = document.createElement("div");
                controls.className = "operation-controls";

                let configInput = null;
                if (operation.configSchema && typeof operation.configSchema === "object" && Object.keys(operation.configSchema).length > 0) {
                  configInput = document.createElement("textarea");
                  configInput.className = "form-control form-control-sm";
                  configInput.rows = 3;
                  configInput.placeholder = "Optional config JSON (match schema)";
                  controls.appendChild(configInput);
                } else {
                  const hint = document.createElement("div");
                  hint.className = "operation-hint";
                  hint.textContent = "No config required";
                  controls.appendChild(hint);
                }

                const runBtn = document.createElement("button");
                runBtn.type = "button";
                runBtn.className = "btn btn-sm btn-success operation-run-btn";
                runBtn.textContent = "Run Operation";
                runBtn.addEventListener("click", () =>
                  handleOperation(defID, operation.name, configInput ? configInput.value : ""),
                );
                controls.appendChild(runBtn);

                opRow.appendChild(controls);
                operationsPanel.appendChild(opRow);
              });
            }

            // --- Webhooks info ---
            if (Array.isArray(definition.webhooks) && definition.webhooks.length) {
              const whInfo = document.createElement("div");
              whInfo.className = "operation-hint mt-1";
              whInfo.textContent = `Webhooks: ${definition.webhooks.map((w) => w.name).join(", ")}`;
              operationsPanel.appendChild(whInfo);
              if (operationsPanel.classList.contains("d-none")) {
                operationsPanel.classList.remove("d-none");
              }
            }

            // --- Common actions ---
            addButton("Disconnect", "outline-danger", () => handleDisconnect(defID));
          });
      }

      // -----------------------------------------------------------------------
      // Auth flow: POST /v1/integrations/auth/start
      // -----------------------------------------------------------------------
      async function handleAuthFlow(definitionID, credentialRef) {
        try {
          const existingIntegration = installedIntegrations.get(definitionID);
          const payload = {
            definitionId: definitionID,
            credentialRef: credentialRef,
          };
          if (existingIntegration) {
            payload.integrationId = existingIntegration.id;
          }

          log(`Starting auth flow for ${definitionID} (credentialRef: ${credentialRef})`, "info");
          const response = await makeRequest("/v1/integrations/auth/start", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          if (!data.authUrl) throw new Error("Provider did not return an authUrl");
          log(`Auth URL received, redirecting...`, "info");
          window.location.href = data.authUrl;
        } catch (err) {
          log(`Auth flow start failed: ${err.message}`, "error");
        }
      }

      // -----------------------------------------------------------------------
      // Operations: POST /v1/integrations/{integrationID}/operations/run
      // -----------------------------------------------------------------------
      async function handleOperation(definitionID, operationName, rawConfig) {
        const integration = installedIntegrations.get(definitionID);
        if (!integration) {
          log(`No installed integration for ${definitionID} - configure or auth first`, "error");
          return;
        }

        let config = undefined;
        if (rawConfig && rawConfig.trim()) {
          try {
            config = JSON.parse(rawConfig);
          } catch (err) {
            log(`Invalid config JSON for ${operationName}: ${err.message}`, "error");
            return;
          }
        }
        try {
          log(`Running ${operationName} on integration ${integration.id}`, "info");
          const response = await makeRequest(`/v1/integrations/${integration.id}/operations/run`, {
            method: "POST",
            body: JSON.stringify({
              body: {
                operation: operationName,
                config: config,
              },
            }),
          });
          const raw = await response.text();
          if (!response.ok) {
            throw new Error(raw || `HTTP ${response.status}`);
          }
          const data = raw ? JSON.parse(raw) : {};
          const status = (data.status || "unknown").toUpperCase();
          const summary = data.summary || "No summary returned";
          const logType = data.success === false || (status !== "OK" && status !== "QUEUED") ? "warning" : "success";
          log(`Operation ${operationName} (${status}): ${summary}`, logType);
          if (data.details) {
            logJSON(`${operationName} details`, data.details, "info");
          }
        } catch (err) {
          log(`Operation ${operationName} failed: ${err.message}`, "error");
        }
      }

      // -----------------------------------------------------------------------
      // Disconnect: POST /v1/integrations/{integrationID}/disconnect
      // -----------------------------------------------------------------------
      async function handleDisconnect(definitionID) {
        const integration = installedIntegrations.get(definitionID);
        if (!integration) {
          log(`No installed integration for ${definitionID}`, "info");
          updateProviderStatusBadge(definitionID, null);
          return;
        }
        try {
          log(`Disconnecting integration ${integration.id} (${definitionID})`, "info");
          const response = await makeRequest(`/v1/integrations/${integration.id}/disconnect`, {
            method: "POST",
          });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          log(`Disconnected: ${data.message || "success"} (deletedId: ${data.deletedId || "n/a"})`, "success");
          if (data.redirectUrl) {
            log(`Provider cleanup URL: ${data.redirectUrl}`, "info");
          }
          if (data.details) {
            logJSON("Disconnect details", data.details, "info");
          }
          updateProviderStatusBadge(definitionID, null);
          await loadInstallations();
        } catch (err) {
          log(`Disconnect failed: ${err.message}`, "error");
        }
      }

      // -----------------------------------------------------------------------
      // Load installed integrations via GraphQL
      // -----------------------------------------------------------------------
      async function loadInstallations() {
        log("Loading installed integrations", "info");
        try {
          const container = document.getElementById("integrationsList");
          const response = await makeRequest("/query", {
            method: "POST",
            body: JSON.stringify({
              query: `{
                integrations {
                  edges {
                    node {
                      id
                      name
                      definitionID
                      status
                      description
                      kind
                      updatedAt
                      metadata
                    }
                  }
                }
              }`,
            }),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          const items = data?.data?.integrations?.edges || [];

          // rebuild installed map
          installedIntegrations.clear();
          items.forEach(({ node }) => {
            if (node.definitionID) {
              installedIntegrations.set(node.definitionID, node);
            }
          });

          // update status badges for all known definitions
          for (const [defID] of providerDefinitions) {
            const inst = installedIntegrations.get(defID);
            updateProviderStatusBadge(defID, inst?.status || null);
          }

          if (items.length === 0) {
            container.innerHTML = '<div class="text-center text-muted">No integrations installed</div>';
            return;
          }
          container.innerHTML = items
            .map(({ node }) => {
              const statusClass =
                node.status === "CONNECTED"
                  ? "text-success"
                  : node.status === "ERRORED"
                    ? "text-danger"
                    : "text-warning";
              return `
                <div class="card mb-2">
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                      <div>
                        <h6 class="card-title mb-1">${node.name}</h6>
                        <small class="text-muted">Definition: <code>${node.definitionID || node.kind || "unknown"}</code></small>
                      </div>
                      <div class="text-end">
                        <span class="${statusClass} fw-semibold">${node.status || "UNKNOWN"}</span><br/>
                        <small class="text-muted">ID: ${node.id}</small>
                      </div>
                    </div>
                    ${node.description ? `<p class="card-text mt-2 mb-1">${node.description}</p>` : ""}
                    <small class="text-muted">Updated ${new Date(node.updatedAt).toLocaleString()}</small>
                    ${node.metadata ? `<details class="mt-1"><summary class="text-muted" style="font-size:0.85rem;cursor:pointer">Metadata</summary><pre style="font-size:0.8rem;max-height:150px;overflow:auto">${JSON.stringify(node.metadata, null, 2)}</pre></details>` : ""}
                  </div>
                </div>
              `;
            })
            .join("");
        } catch (err) {
          log(`Failed to load integrations: ${err.message}`, "error");
        }
      }

      // -----------------------------------------------------------------------
      // OAuth callback notice
      // -----------------------------------------------------------------------
      function handleOAuthCallback() {
        const params = new URLSearchParams(window.location.search);
        const provider = params.get("provider");
        const status = params.get("status");
        const message = params.get("message");
        if (!provider || !status) return;
        const container = document.getElementById("callbackNotice");
        container.innerHTML = `
          <div class="alert ${status === "success" ? "alert-success" : "alert-danger"} alert-dismissible fade show">
            <strong>${status === "success" ? "Integration Connected" : "Integration Error"}:</strong>
            ${decodeURIComponent(message || provider)}
            <button type="button" class="btn-close" onclick="this.parentElement.remove()"></button>
          </div>
        `;
      }

      // -----------------------------------------------------------------------
      // Initialize
      // -----------------------------------------------------------------------
      async function loadProvidersAndInstallations() {
        const providers = await fetchProviders();
        renderProviders(providers);
        await loadInstallations();
      }

      async function initialize() {
        log("Initializing integration console", "info");
        handleOAuthCallback();
        const authed = await ensureAuthenticated();
        if (!authed) {
          log("Authentication required before continuing", "error");
          return;
        }
        await loadProvidersAndInstallations();
        log("Initialization complete", "success");
      }

      document.addEventListener("DOMContentLoaded", () => {
        initialize();
        document.getElementById("loginButton").addEventListener("click", () => {
          loginWithSeedUser().then((ok) => ok && initialize());
        });
        document.getElementById("refreshProviders").addEventListener("click", loadProvidersAndInstallations);
        document.getElementById("refreshIntegrations").addEventListener("click", loadInstallations);
        document.getElementById("clearLog").addEventListener("click", () => {
          document.getElementById("activityLog").innerHTML = "";
        });
        document.getElementById("configModalClose").addEventListener("click", closeConfigModal);
        document.getElementById("configModalCancel").addEventListener("click", closeConfigModal);
        document.getElementById("configModalSubmit").addEventListener("click", submitConfiguration);
        document.getElementById("configModal").addEventListener("click", (event) => {
          if (event.target.id === "configModal") {
            closeConfigModal();
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeConfigModal();
          }
        });
      });

      window.loginWithSeedUser = loginWithSeedUser;
    </script>
  </body>
</html>
