    /v1/login:
        post:
            description: Login is oriented towards human users who use their email and password for authentication. Login verifies the password submitted for the user is correct by looking up the user by email and using the argon2 derived key verification process to confirm the password matches. Upon authentication an access token and a refresh token with the authorized claims of the user are returned. The user can use the access token to authenticate to our systems. The access token has an expiration and the refresh token can be used with the refresh endpoint to get a new access token without the user having to log in again. The refresh token overlaps with the access token to provide a seamless authentication experience and the user can refresh their access token so long as the refresh token is valid
            operationId: LoginHandler
            requestBody:
                content:
                    application/json:
                        examples:
                            AvailableAuthTypeRequest:
                                value:
                                    password: ""
                                    username: sfunky@theopenlane.io
                            LoginSuccessRequest:
                                value:
                                    password: mitb!
                                    username: sfunky@theopenlane.io
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
                description: Request body
            responses:
                "200":
                    content:
                        application/json:
                            examples:
                                LoginSuccessResponse:
                                    value:
                                        access_token: access_token
                                        message: ""
                                        refresh_token: refresh_token
                                        session: session
                                        success: true
                                        tfa_enabled: true
                                        token_type: bearer
                            schema:
                                $ref: '#/components/schemas/LoginReply'
                    description: OK
                "302":
                    description: Found
                    headers:
                        Location:
                            description: Destination URL of the redirect
                            schema:
                                type: string
                "400":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: bad request
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: unauthorized
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Unauthorized
                "403":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: forbidden
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Forbidden
                "404":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: not found
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Not Found
                "429":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: too many requests
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Too Many Requests
                "500":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: internal server error
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Internal Server Error
            security: []
            summary: Login
            tags:
                - Authentication
