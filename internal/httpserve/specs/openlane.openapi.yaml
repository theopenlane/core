externalDocs:
    description: Documentation for Openlane's API services
    url: https://docs.theopenlane.io
info:
    contact:
        email: support@theopenlane.io
        name: Openlane
        url: https://www.theopenlane.io
    description: Openlane's API services are designed to provide a simple and easy to use interface for interacting with the Openlane platform. This API is designed to be used by both internal and external clients to interact with the Openlane platform.
    license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0
    title: Openlane OpenAPI 3.1.1 Specifications
    version: v0.0.0-dev
openapi: 3.1.1
paths:
    /api-docs:
        get:
            description: Get OpenAPI 3.1.1 specification for this API
            operationId: APIDocs
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: OK
                "429":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: too many requests
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Too Many Requests
                "500":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: internal server error
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Internal Server Error
            security: []
            summary: APIDocs
            tags:
                - documentation
    /oauth/userinfo:
        get:
            description: Get user information for OAuth authenticated user
            operationId: UserInfo
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: OK
                "400":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: bad request
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: unauthorized
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: internal server error
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Internal Server Error
            security:
                - bearer: []
                - apiKey: []
            summary: UserInfo
            tags:
                - Account Management
    /questionnaire:
        get:
            description: Get questionnaire template configuration for authenticated anonymous users
            operationId: GetQuestionnaire
            responses:
                "200":
                    content:
                        application/json:
                            examples:
                                GetQuestionnaireResponse:
                                    value:
                                        jsonconfig:
                                            description: A sample questionnaire template
                                            title: Sample Questionnaire
                            schema:
                                $ref: '#/components/schemas/GetQuestionnaireResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: bad request
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: unauthorized
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: not found
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Not Found
                "500":
                    content:
                        application/json:
                            examples:
                                error:
                                    value:
                                        error: internal server error
                                        success: false
                            schema:
                                $ref: '#/components/schemas/ErrorReply'
                    description: Internal Server Error
            security:
                - bearer: []
                - apiKey: []
            summary: GetQuestionnaire
