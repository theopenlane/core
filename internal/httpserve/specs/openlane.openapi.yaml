components:
    parameters:
        attributes:
            description: |
                A comma-separated list of attribute names to return in the response,
                overriding the default set of attributes. Attribute names must be in
                standard attribute notation form.
            example: userName,emails,name
            in: query
            name: attributes
            schema:
                type: string
        count:
            description: The number of resources returned in a list response page
            in: query
            name: count
            schema:
                default: 100
                minimum: 1
                type: integer
        excludedAttributes:
            description: |
                A comma-separated list of attribute names to exclude from the default
                set of attributes to return. Attribute names must be in standard
                attribute notation form.
            example: groups
            in: query
            name: excludedAttributes
            schema:
                type: string
        filter:
            description: |
                Filter expression for querying resources. Follows SCIM filter syntax as defined in
                [RFC 7644 Section 3.4.2.2](https://datatracker.ietf.org/doc/html/rfc7644#section-3.4.2.2).

                Example: `userName eq "mitb@meowmeow.com"`
            in: query
            name: filter
            schema:
                type: string
        groupId:
            description: The unique identifier for the group
            in: path
            name: id
            required: true
            schema:
                type: string
        startIndex:
            description: The 1-based index of the first result in the current set of list results
            in: query
            name: startIndex
            schema:
                default: 1
                minimum: 1
                type: integer
        userId:
            description: The unique identifier for the user
            in: path
            name: id
            required: true
            schema:
                type: string
    requestBodies:
        GroupBody:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/Group'
            description: Group resource attributes
            required: true
        PatchBody:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/PatchRequest'
            description: SCIM PATCH operation as defined in RFC 7644 Section 3.5.2
            required: true
        UserBody:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/User'
            description: User resource attributes
            required: true
    responses:
        BadRequest:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Request is unparsable, syntactically incorrect, or violates schema
        Conflict:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: |
                The specified version number does not match the resource's latest version number,
                or a service provider refused to create a new, duplicate resource
        Forbidden:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Operation is not permitted based on the supplied authorization
        GroupCreated:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/Group'
            description: Group created successfully
            headers:
                Location:
                    description: The URL of the newly created group
                    required: true
                    schema:
                        type: string
        GroupList:
            content:
                application/scim+json:
                    schema:
                        properties:
                            Resources:
                                items:
                                    $ref: '#/components/schemas/Group'
                                type: array
                            itemsPerPage:
                                $ref: '#/components/schemas/itemsPerPage'
                            schemas:
                                $ref: '#/components/schemas/listResponseSchemas'
                            startIndex:
                                $ref: '#/components/schemas/startIndex'
                            totalResults:
                                $ref: '#/components/schemas/totalResults'
                        type: object
            description: List of groups
        GroupRetrieved:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/Group'
            description: Group retrieved successfully
        GroupUpdated:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/Group'
            description: Group updated successfully
        InternalServerError:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Internal Server Error
        NotFound:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Resource not found
        Unauthorized:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
            description: Authorization failure. The authorization header is invalid or missing
        UserCreated:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/User'
            description: User created successfully
            headers:
                Location:
                    description: The URL of the newly created user
                    required: true
                    schema:
                        type: string
        UserList:
            content:
                application/scim+json:
                    schema:
                        properties:
                            Resources:
                                items:
                                    $ref: '#/components/schemas/User'
                                type: array
                            itemsPerPage:
                                $ref: '#/components/schemas/itemsPerPage'
                            schemas:
                                $ref: '#/components/schemas/listResponseSchemas'
                            startIndex:
                                $ref: '#/components/schemas/startIndex'
                            totalResults:
                                $ref: '#/components/schemas/totalResults'
                        type: object
            description: List of users
        UserRetrieved:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/User'
            description: User retrieved successfully
        UserUpdated:
            content:
                application/scim+json:
                    schema:
                        $ref: '#/components/schemas/User'
            description: User updated successfully
    schemas:
        AccountAccessRequest:
            properties:
                object_id:
                    description: The ID of the object to check access for
                    example: 01J4EXD5MM60CX4YNYN0DEE3Y1
                    type: string
                object_type:
                    description: The type of object to check access for, e.g. organization, program, procedure, etc
                    example: organization
                    type: string
                relation:
                    description: The relation to check access for, e.g. can_view, can_edit
                    example: can_view
                    type: string
                subject_type:
                    description: The type of subject to check access for, e.g. service, user
                    example: user
                    type: string
            type: object
        AccountFeaturesReply:
            properties:
                error:
                    description: The error message if the request was unsuccessful
                    type: string
                error_code:
                    description: The error code if the request was unsuccessful
                    type: string
                features:
                    description: The features the user has access to in the organization, e.g. policy-and-procedure-module, compliance-module
                    items:
                        description: The features the user has access to in the organization, e.g. policy-and-procedure-module, compliance-module
                        type: string
                    type: array
                organization_id:
                    description: The ID of the organization the user has features in
                    example: 01J4HMNDSZCCQBTY93BF9CBF5D
                    type: string
                success:
                    description: Whether or not the request was successful or not
                    type: boolean
                unverified:
                    type: boolean
            type: object
        AccountRolesMeReply:
            properties:
                error:
                    description: The error message if the request was unsuccessful
                    type: string
                error_code:
                    description: The error code if the request was unsuccessful
                    type: string
                organization_id:
                    description: The ID of the organization the roles apply to
                    example: 01J4HMNDSZCCQBTY93BF9CBF5D
                    type: string
                roles:
                    description: Organization responsibility roles assigned to the authenticated caller
                    items:
                        description: Organization responsibility roles assigned to the authenticated caller
                        properties:
                            description:
                                description: The role description
                                example: Manage all policies and procedures
                                type: string
                            id:
                                description: The role relation ID
                                example: policy_manager
                                type: string
                            name:
                                description: The display name for the role
                                example: Policy Manager
                                type: string
                        type: object
                    type: array
                success:
                    description: Whether or not the request was successful or not
                    type: boolean
                unverified:
                    type: boolean
            type: object
        AccountRolesOrganizationReply:
            properties:
                error:
                    description: The error message if the request was unsuccessful
                    type: string
                error_code:
                    description: The error code if the request was unsuccessful
                    type: string
                organization_id:
                    description: The ID of the organization the user has roles in
                    example: 01J4HMNDSZCCQBTY93BF9CBF5D
                    type: string
                roles:
                    description: The roles the user has in the organization, e.g. can_view, can_edit
                    items:
                        description: The roles the user has in the organization, e.g. can_view, can_edit
                        type: string
                    type: array
                success:
                    description: Whether or not the request was successful or not
                    type: boolean
                unverified:
                    type: boolean
            type: object
        AccountRolesRequest:
            properties:
                object_id:
                    description: ' @deprecated use ObjectIDs instead. The ID of the object to check roles for'
                    example: 01J4EXD5MM60CX4YNYN0DEE3Y1
                    type: string
                object_ids:
                    description: The IDs of the object to check roles for, can be used to check multiple ids in one request
                    items:
                        description: The IDs of the object to check roles for, can be used to check multiple ids in one request
                        type: string
                    type: array
                object_type:
                    description: The type of object to check roles for, e.g. organization, program, procedure, etc
                    example: organization
                    type: string
                relations:
                    description: The relations to check roles for, e.g. can_view, can_edit
                    items:
                        description: The relations to check roles for, e.g. can_view, can_edit
                        type: string
                    type: array
                subject_type:
                    description: The type of subject to check roles for, e.g. service, user
                    example: user
                    type: string
            type: object
        DeleteIntegrationResponse:
            properties:
                deletedId:
                    type: string
                details: {}
                error:
                    description: The error message if the request was unsuccessful
                    type: string
                error_code:
                    description: The error code if the request was unsuccessful
                    type: string
                message:
                    type: string
                redirectUrl:
                    type: string
                success:
                    description: Whether or not the request was successful or not
                    type: boolean
                unverified:
                    type: boolean
            type: object
        DisconnectIntegrationRequest:
            properties:
                IntegrationID:
                    description: Integration ID to disconnect
                    example: 01J4HMNDSZCCQBTY93BF9CBF5D
                    type: string
            type: object
        ErrorReply:
            properties:
                error:
                    description: The error message if the request was unsuccessful
                    type: string
                error_code:
                    description: The error code if the request was unsuccessful
                    type: string
                success:
                    description: Whether or not the request was successful or not
                    type: boolean
                unverified:
                    type: boolean
            type: object
        ErrorResponse:
            description: Error response as defined in RFC 7644 Section 3.12
            properties:
                detail:
                    description: A detailed human-readable message
                    type: string
                schemas:
                    items:
                        enum:
                            - urn:ietf:params:scim:api:messages:2.0:Error
                        type: string
                    type: array
                scimType:
                    description: A SCIM detail error type
                    enum:
                        - invalidFilter
                        - tooMany
                        - uniqueness
                        - mutability
                        - invalidSyntax
                        - invalidPath
                        - noTarget
                        - invalidValue
                        - invalidVers
                        - sensitive
                    type: string
                status:
                    description: The HTTP status code expressed as a JSON string
                    enum:
                        - "400"
                        - "401"
                        - "403"
                        - "404"
                        - "409"
                        - "500"
                        - "501"
                    type: string
            required:
                - schemas
                - status
            type: object
        ForgotPasswordReply:
            properties:
                error:
