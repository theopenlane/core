  import-template-controls:
    title: Writing your controls
    taskKindName: Control Implementation
    details: |
      Controls define how you actually meet requirements, grounded in the policies you wrote. Every control should trace back to a policy that requires the activity, and every operational obligation in a policy should either map to a control or be a deliberate governance-only statement.

      Depending on the size of your organization and scope of your audit, most organizations should generally have 70-100 organizational controls. These map back to both your policies as well as the audit framework controls. In many cases you can write a single organization control that will satisfy multiple controls from the audit framework.

      Need some help? [Book](https://calendly.com/kwaters-theopenlane) some time with us and we'll get you started.
    priority: 50
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/controls/writing-controls
      references:
        - name: "Getting Started: From Gaps To Controls"
          url: https://docs.theopenlane.io/docs/platform/grc-fundamentals/audit/gapanalysis#from-gaps-to-controls
        - name: "Best practices: Writing Good Controls"
          url: https://docs.theopenlane.io/docs/platform/compliance-management/controls/writing-controls
        - name: "Best practices: Writing Control Implementations"
          url: https://docs.theopenlane.io/docs/platform/compliance-management/controls/implementations#writing-a-good-implementation
        - name: "Blog: Confusing Frameworks with Requirements"
          url: https://www.theopenlane.io/blog/compliance-tools-frameworks-vs-requirements

  import-existing-policies:
    title: Import existing policies
    taskKindName: Policy Review
    details: |
      Import your existing policies into Openlane so they can be reviewed, updated, assigned to controls, and managed alongside the rest of your compliance program.

      ### Options

      #### Upload from Console

      Upload existing policies in Markdown or Microsoft Word format in Console(https://console.theopenlane.io/policies)

      #### Connect With Integrations

      Sync policies directly from our supported [integrations](https://console.theopenlane.io/automation/integrations?tags=document) such as Google Drive or OneDrive to keep Openlane aligned with your existing documentation.

      #### Sync from GitHub

      Keep Markdown-based policies in sync directly from a GitHub repository.
    priority: 70
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/import
      references:
        - name: "Best Practices: Writing Policies That Hold Up"
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/policies#writing-policies-that-hold-up
        - name: Importing Policies
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/import
        - name: Sync Policies with GitHub Actions
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/import#continuous-sync-from-github

  import-policy-templates:
    title: Start with policy templates
    taskKindName: Policy Review
    details: |
      Learn about the different ways to create and manage policies in Openlane. Start with open-source templates, generate drafts with AI, or synchronize existing policies from your document systems or GitHub as your compliance program matures.

      ### Create policies in Openlane

      Choose the approach that best fits your organization.

      #### Start with Policy Hub

      Browse Openlane's library of open-source policy templates and customize them to reflect how your organization operates.

      [Open Policies](https://console.theopenlane.io/policies)

      #### Generate with AI

      Create draft policies tailored to your organization and selected compliance frameworks, then review and customize them before adoption.

      [Generate policies](https://console.theopenlane.io/policies)

      ### Import or synchronize existing policies

      #### Connect document sources

      Keep policies synchronized from Google Drive, OneDrive, and other supported document providers so Openlane stays aligned with your existing documentation.

      [Manage document integrations](https://console.theopenlane.io/automation/integrations?tags=document)

      #### Sync from GitHub

      Automatically synchronize Markdown-based policies from a GitHub repository as they change.

    priority: 70
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/policies
      references:
        - name: Best practices for writing policies
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/policies#writing-policies-that-hold-up
        - name: Policy framework mappings
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/policy-framework-mapping
        - name: Importing existing policies
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/import
        - name: Openlane Policy Hub on GitHub
          url: https://github.com/theopenlane/policy-hub
        - name: Continuous GitHub synchronization
          url: https://docs.theopenlane.io/docs/platform/compliance-management/policy-and-procedure-management/import#continuous-sync-from-github


  has-auditor-at-onboarding:
    title: Connect your auditor
    taskKindName: Operational
    details: |
      When you're ready for your audit, invite your auditor to Openlane so they can review evidence, request additional documentation, and collaborate with your team throughout the audit.

      #### Invite your auditor

      [Invite](https://console.theopenlane.io/settings/members) your auditor as a member of your Openlane organization with the Auditor role
    priority: 40
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/organizations/members
      references:
        - name: Find an Openlane Auditor Partner
          url: https://www.theopenlane.io/alliances/auditors

  wants-auditor-recommendation:
    title: Get matched with an auditor
    taskKindName: Operational
    details: |
      Need an auditor? Browse Openlane's network of trusted audit partners experienced with SOC 2, ISO 27001, HIPAA, and other compliance frameworks. Choose the firm that's the best fit for your organization and engage them when you're ready to begin your audit.

      ### Find an Auditor

      [Browse Auditor Partners](https://www.theopenlane.io/alliances/auditors)
    priority: 40
    metadata:
      references:
        - name: "Best Practices: Selecting an Audit Firm"
          url: https://docs.theopenlane.io/docs/platform/grc-fundamentals/audit/firms

  wants-partner-recommendation:
    title: Get matched with a vCISO
    taskKindName: Operational
    details: |
      Need help building or managing your compliance program? Openlane works with experienced virtual CISOs and compliance consultants who can help implement controls, write policies, prepare evidence, and guide you through your audit.

      ### Find a Service Provider

      [Browse Service Providers](https://www.theopenlane.io/alliances/service-providers)
    priority: 40

  demo-requested:
    title: Schedule your onboarding call
    taskKindName: Operational
    details: |
      Meet with the Openlane team to get your workspace set up, review your compliance goals, and learn best practices for building and managing your compliance program.

      ### Book Time

      [Schedule an Onboarding Call](https://calendly.com/kwaters-theopenlane)

      #### We'll Cover

      - Setting up your compliance program
      - Importing policies and controls
      - Configuring integrations and automation
      - Questions about frameworks, audits, and best practices
    priority: 100
