    taskKindName: Operational
    details: |
      Kick your program off by creating a program with the framework controls
    priority: 10
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/programs/overview
      link: '{{if eq .value "soc2"}}/programs/create/soc2?onboarding=true{{else}}/programs/create/framework-based?onboarding=true&framework={{.label}}{{end}}{{if .auditor_name}}&auditorName={{.auditor_name}}{{end}}{{if .auditor_email}}&auditorEmail={{.auditor_email}}{{end}}'

  framework-generic:
    title: Set up your compliance program
    taskKindName: Operational
    details: |
      Kick your program off by creating a program with the controls you need
    priority: 10
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/programs/overview
      link: /programs/create?onboarding=true

  import-existing-controls:
    title: Import existing controls
    taskKindName: Control Implementation
    details: |
      Controls define how you actually meet requirements, grounded in the policies you just wrote. We built CSV import so you can bring in controls you have already defined in other systems or spreadsheets.
    priority: 50
    metadata:
      docsLink: https://docs.theopenlane.io/docs/platform/compliance-management/controls/import
      references:
        - name: "Getting started: From Gaps to Controls"
          url: https://docs.theopenlane.io/docs/platform/grc-fundamentals/audit/gapanalysis#from-gaps-to-controls
        - name: "Best practices: Writing Good Control Implementations"
          url: https://docs.theopenlane.io/docs/platform/compliance-management/controls/implementations#writing-a-good-implementation
        - name: Import Fields for Controls
          url: https://docs.theopenlane.io/docs/platform/compliance-management/controls/import#framework-control-csv-fields

