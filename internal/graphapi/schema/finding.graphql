extend type Query {
    """
    Look up finding by ID
    """
     finding(
        """
        ID of the finding
        """
        id: ID!
    ):  Finding!
}

extend type Mutation{
    """
    Create a new finding
    """
    createFinding(
        """
        values of the finding
        """
        input: CreateFindingInput!
    ): FindingCreatePayload!
    """
    Create multiple new findings
    """
    createBulkFinding(
        """
        values of the finding
        """
        input: [CreateFindingInput!]
    ): FindingBulkCreatePayload!
    """
    Create multiple new findings via file upload
    """
    createBulkCSVFinding(
        """
        csv file containing values of the finding
        """
        input: Upload!
    ): FindingBulkCreatePayload!
    """
    Update an existing finding
    """
    updateFinding(
        """
        ID of the finding
        """
        id: ID!
        """
        New values for the finding
        """
        input: UpdateFindingInput!
    ): FindingUpdatePayload!
    """
    Delete an existing finding
    """
    deleteFinding(
        """
        ID of the finding
        """
        id: ID!
    ): FindingDeletePayload!
    """
    Update multiple existing findings
    """
    updateBulkFinding(
        """
        IDs of the findings to update
        """
        ids: [ID!]!
        """
        values to update the findings with
        """
        input: UpdateFindingInput!
    ): FindingBulkUpdatePayload!
    """
    Update multiple existing findings via file upload
    """
    updateBulkCSVFinding(
        """
        csv file containing values of the finding, must include ID column
        """
        input: Upload!
    ): FindingBulkUpdatePayload!
    """
    Delete multiple findings
    """
    deleteBulkFinding(
        """
        IDs of the findings to delete
        """
        ids: [ID!]!
    ): FindingBulkDeletePayload!
}

"""
Return response for createFinding mutation
"""
type FindingCreatePayload {
    """
    Created finding
    """
    finding: Finding!
}

"""
Return response for updateFinding mutation
"""
type FindingUpdatePayload {
    """
    Updated finding
    """
    finding: Finding!
}

"""
Return response for deleteFinding mutation
"""
type FindingDeletePayload {
    """
    Deleted finding ID
    """
    deletedID: ID!
}

"""
Return response for createBulkFinding mutation
"""
type FindingBulkCreatePayload {
    """
    Created findings
    """
    findings: [Finding!]
}

"""
Return response for updateBulkFinding mutation
"""
type FindingBulkUpdatePayload {
    """
    Updated findings
    """
    findings: [Finding!]
    """
    IDs of the updated findings
    """
    updatedIDs: [ID!]
}

"""
Return response for deleteBulkFinding mutation
"""
type FindingBulkDeletePayload {
    """
    Deleted finding IDs
    """
    deletedIDs: [ID!]!
}