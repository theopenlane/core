extend type Assessment {
    """
    Indicates if this assessment has pending changes awaiting workflow approval
    """
    hasPendingWorkflow: Boolean!
    """
    Indicates if this assessment has any workflow history (completed or failed instances)
    """
    hasWorkflowHistory: Boolean!
    """
    Returns active workflow instances for this assessment (RUNNING or PAUSED)
    """
    activeWorkflowInstances: [WorkflowInstance!]!
    """
    Returns the workflow event timeline for this assessment across all workflow instances
    """
    workflowTimeline(
        after: Cursor
        first: Int
        before: Cursor
        last: Int
        orderBy: [WorkflowEventOrder!]
        where: WorkflowEventWhereInput
        includeEmitFailures: Boolean
    ): WorkflowEventConnection!
}

extend type Query {
    """
    Look up assessment by ID
    """
     assessment(
        """
        ID of the assessment
        """
        id: ID!
    ):  Assessment!
}

extend type Mutation{
    """
    Create a new assessment
    """
    createAssessment(
        """
        values of the assessment
        """
        input: CreateAssessmentInput!
    ): AssessmentCreatePayload!
    """
    Update an existing assessment
    """
    updateAssessment(
        """
        ID of the assessment
        """
        id: ID!
        """
        New values for the assessment
        """
        input: UpdateAssessmentInput!
    ): AssessmentUpdatePayload!
    """
    Delete an existing assessment
    """
    deleteAssessment(
        """
        ID of the assessment
        """
        id: ID!
    ): AssessmentDeletePayload!
    """
    Delete multiple assessments
    """
    deleteBulkAssessment(
        """
        IDs of the assessments to delete
        """
        ids: [ID!]!
    ): AssessmentBulkDeletePayload!
}

"""
Return response for createAssessment mutation
"""
type AssessmentCreatePayload {
    """
    Created assessment
    """
    assessment: Assessment!
}

"""
Return response for updateAssessment mutation
"""
type AssessmentUpdatePayload {
    """
    Updated assessment
    """
    assessment: Assessment!
}

"""
Return response for deleteAssessment mutation
"""
type AssessmentDeletePayload {
    """
    Deleted assessment ID
    """
    deletedID: ID!
}

"""
Return response for deleteBulkAssessment mutation
"""
type AssessmentBulkDeletePayload {
    """
    Deleted assessment IDs
    """
    deletedIDs: [ID!]!
    """
    IDs that were not deleted
    """
    notDeletedIDs: [ID!]!
    """
    Error message when the bulk delete did not apply to every requested ID
    """
    error: String
}

