extend type AssessmentResponse {
    """
    Indicates if this assessmentResponse has pending changes awaiting workflow approval
    """
    hasPendingWorkflow: Boolean!
    """
    Indicates if this assessmentResponse has any workflow history (completed or failed instances)
    """
    hasWorkflowHistory: Boolean!
    """
    Returns active workflow instances for this assessmentResponse (RUNNING or PAUSED)
    """
    activeWorkflowInstances: [WorkflowInstance!]!
    """
    Returns the workflow event timeline for this assessmentResponse across all workflow instances
    """
    workflowTimeline(
        after: Cursor
        first: Int
        before: Cursor
        last: Int
        orderBy: [WorkflowEventOrder!]
        where: WorkflowEventWhereInput
        includeEmitFailures: Boolean
    ): WorkflowEventConnection!
}

extend type Query {
    """
    Look up assessmentResponse by ID
    """
     assessmentResponse(
        """
        ID of the assessmentResponse
        """
        id: ID!
    ):  AssessmentResponse!
}

extend type Mutation{
    """
    Create a new assessmentResponse
    """
    createAssessmentResponse(
        """
        values of the assessmentResponse
        """
        input: CreateAssessmentResponseInput!
    ): AssessmentResponseCreatePayload!
    """
    Delete an existing assessmentResponse
    """
    deleteAssessmentResponse(
        """
        ID of the assessmentResponse
        """
        id: ID!
    ): AssessmentResponseDeletePayload!
}

"""
Return response for createAssessmentResponse mutation
"""
type AssessmentResponseCreatePayload {
    """
    Created assessmentResponse
    """
    assessmentResponse: AssessmentResponse!
}

"""
Return response for deleteAssessmentResponse mutation
"""
type AssessmentResponseDeletePayload {
    """
    Deleted assessmentResponse ID
    """
    deletedID: ID!
}

