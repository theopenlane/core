extend type Query {
    """
    Look up review by ID
    """
     review(
        """
        ID of the review
        """
        id: ID!
    ):  Review!
}

extend type Mutation{
    """
    Create a new review
    """
    createReview(
        """
        values of the review
        """
        input: CreateReviewInput!,
        """
        Files to attach to the review
        """
        reviewFiles: [Upload!]
        reviewFilesMetadata: [FileMetadataInput!]
    ): ReviewCreatePayload!
    """
    Create multiple new reviews
    """
    createBulkReview(
        """
        values of the review
        """
        input: [CreateReviewInput!]
    ): ReviewBulkCreatePayload!
    """
    Delete multiple existing reviews (soft-deletes them and removes FGA tuples)
    """
    deleteBulkReview(
        """
        IDs of the reviews to delete
        """
        ids: [ID!]!
    ): ReviewBulkDeletePayload!
    """
    Create multiple new reviews via file upload
    """
    createBulkCSVReview(
        """
        csv file containing values of the review
        """
        input: Upload!
    ): ReviewBulkCreatePayload!
    """
    Update an existing review
    """
    updateReview(
        """
        ID of the review
        """
        id: ID!
        """
        New values for the review
        """
        input: UpdateReviewInput!
        """
        Files to attach to the review
        """
        reviewFiles: [Upload!]
        reviewFilesMetadata: [FileMetadataInput!]
    ): ReviewUpdatePayload!
    """
    Delete an existing review
    """
    deleteReview(
        """
        ID of the review
        """
        id: ID!
    ): ReviewDeletePayload!
    """
    Update multiple existing reviews
    """
    updateBulkReview(
        """
        IDs of the reviews to update
        """
        ids: [ID!]!
        """
        values to update the reviews with
        """
        input: UpdateReviewInput!
    ): ReviewBulkUpdatePayload!
    """
    Update multiple existing reviews via file upload
    """
    updateBulkCSVReview(
        """
        csv file containing values of the review, must include ID column
        """
        input: Upload!
    ): ReviewBulkUpdatePayload!
}

"""
Return response for createReview mutation
"""
type ReviewCreatePayload {
    """
    Created review
    """
    review: Review!
}

"""
Return response for updateReview mutation
"""
type ReviewUpdatePayload {
    """
    Updated review
    """
    review: Review!
}

"""
Return response for deleteReview mutation
"""
type ReviewDeletePayload {
    """
    Deleted review ID
    """
    deletedID: ID!
}

"""
Return response for createBulkReview mutation
"""
type ReviewBulkCreatePayload {
    """
    Created reviews
    """
    reviews: [Review!]
}

"""
Return response for updateBulkReview mutation
"""
type ReviewBulkUpdatePayload {
    """
    Updated reviews
    """
    reviews: [Review!]
    """
    IDs of the updated reviews
    """
    updatedIDs: [ID!]
}

"""
Return response for deleteBulkReview mutation
"""
type ReviewBulkDeletePayload {
    """
    Deleted trustCenterNDARequest IDs
    """
    deletedIDs: [ID!]!
    """
    IDs that were not deleted
    """
    notDeletedIDs: [ID!]!
    """
    Error message when the bulk delete did not apply to every requested ID
    """
    error: String
}
