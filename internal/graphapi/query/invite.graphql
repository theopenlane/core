mutation CreateBulkCSVInvite ($input: Upload!) {
	createBulkCSVInvite(input: $input) {
		invites {
			createdAt
			createdBy
			expires
			id
			ownerID
			ownershipTransfer
			recipient
			requestorID
			role
			sendAttempts
			status
			updatedAt
			updatedBy
		}
	}
}
mutation CreateBulkInvite ($input: [CreateInviteInput!]) {
	createBulkInvite(input: $input) {
		invites {
			createdAt
			createdBy
			expires
			id
			ownerID
			ownershipTransfer
			recipient
			requestorID
			role
			sendAttempts
			status
			updatedAt
			updatedBy
		}
	}
}
mutation CreateInvite ($input: CreateInviteInput!) {
	createInvite(input: $input) {
		invite {
			createdAt
			createdBy
			expires
			id
			ownerID
			ownershipTransfer
			recipient
			requestorID
			role
			sendAttempts
			status
			updatedAt
			updatedBy
			owner {
				id
			}
			groups {
				edges {
					node {
						id
					}
				}
			}
		}
	}
}
mutation DeleteInvite ($deleteInviteId: ID!) {
	deleteInvite(id: $deleteInviteId) {
		deletedID
	}
}
query GetAllInvites {
	invites {
		edges {
			node {
				id
				recipient
				role
				status
				groups {
					edges {
						node {
							id
						}
					}
				}
			}
		}
	}
}
query GetInviteByID ($inviteId: ID!) {
	invite(id: $inviteId) {
		createdAt
		createdBy
		expires
		id
		ownerID
		ownershipTransfer
		recipient
		requestorID
		role
		sendAttempts
		status
		updatedAt
		updatedBy
		owner {
			displayName
			id
			name
		}
	}
}
query InvitesByOrgID ($where: InviteWhereInput) {
	invites(where: $where) {
		edges {
			node {
				owner {
					id
					invites {
						edges {
							node {
								recipient
								requestorID
								role
								sendAttempts
								status
							}
						}
					}
				}
			}
		}
	}
}
