query GetIdentityHolderDirectoryAccounts($identityHolderId: ID!, $first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [DirectoryAccountOrder!], $where: DirectoryAccountWhereInput) {
  identityHolder(id: $identityHolderId) {
    id
    email
    fullName
    directoryAccounts(
      first: $first
      last: $last
      after: $after
      before: $before
      orderBy: $orderBy
      where: $where
    ) {
      totalCount
      pageInfo {
        startCursor
        endCursor
        hasPreviousPage
        hasNextPage
      }
      edges {
        node {
          accountType
          addedAt
          avatarLocalFileID
          avatarRemoteURL
          avatarUpdatedAt
          canonicalEmail
          createdAt
          createdBy
          department
          directoryInstanceID
          directoryName
          directorySyncRunID
          displayID
          displayName
          environmentID
          environmentName
          externalID
          familyName
          firstSeenAt
          givenName
          id
          identityHolderID
          integrationID
          jobTitle
          lastLoginAt
          lastSeenAt
          lastSeenIP
          metadata
          mfaState
          observedAt
          organizationUnit
          ownerID
          platformID
          primarySource
          profile
          profileHash
          rawProfileFileID
          removedAt
          scopeID
          scopeName
          secondaryKey
          sourceVersion
          status
          tags
          updatedAt
          updatedBy
        }
      }
    }
  }
}

