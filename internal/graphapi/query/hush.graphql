mutation CreateBulkCSVHush ($input: Upload!) {
	createBulkCSVHush(input: $input) {
		hushes {
			createdAt
			createdBy
			credentialSet
			description
			expiresAt
			id
			internalNotes
			kind
			lastUsedAt
			metadata
			name
			ownerID
			secretName
			systemInternalID
			systemOwned
			updatedAt
			updatedBy
			integrations {
				edges {
					node {
						id
					}
				}
			}
		}
	}
}
