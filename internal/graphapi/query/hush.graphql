query GetAllHushes {
	hushes {
		edges {
			node {
				description
				id
				kind
				name
				secretName
				integrations {
					edges {
						node {
							id
						}
					}
				}
				ownerID
				createdAt
				updatedAt
				createdBy
				updatedBy
			}
		}
	}
}
query GetHushByID ($hushId: ID!) {
	hush(id: $hushId) {
		createdAt
		createdBy
		credentialSet
		description
		expiresAt
		id
		internalNotes
		kind
		lastUsedAt
		metadata
		name
		ownerID
		secretName
		systemInternalID
		systemOwned
		updatedAt
		updatedBy
		integrations {
			edges {
				node {
					id
				}
			}
		}
	}
}
query GetHushes ($where: HushWhereInput) {
	hushes(where: $where) {
		edges {
			node {
				description
				id
				kind
				name
				secretName
				integrations {
					edges {
						node {
							id
						}
					}
				}
				ownerID
				createdAt
				updatedAt
				createdBy
				updatedBy
			}
		}
	}
}
mutation UpdateHush ($updateHushId: ID!, $input: UpdateHushInput!) {
	updateHush(id: $updateHushId, input: $input) {
		hush {
			createdAt
			createdBy
			credentialSet
			description
			expiresAt
			id
			internalNotes
			kind
			lastUsedAt
			metadata
			name
			ownerID
			secretName
			systemInternalID
			systemOwned
			updatedAt
			updatedBy
			integrations {
				edges {
					node {
						id
					}
				}
			}
		}
	}
}
