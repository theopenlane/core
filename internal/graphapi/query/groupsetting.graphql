query GetAllGroupSettings {
	groupSettings {
		edges {
			node {
				id
				joinPolicy
				syncToGithub
				syncToSlack
				visibility
				group {
					id
					name
				}
				createdAt
				createdBy
				updatedAt
				updatedBy
			}
		}
	}
}
query GetGroupSettingByID ($groupSettingId: ID!) {
	groupSetting(id: $groupSettingId) {
		createdAt
		createdBy
		groupID
		id
		joinPolicy
		syncToGithub
		syncToSlack
		updatedAt
		updatedBy
		visibility
		group {
			id
			name
		}
	}
}
query GetGroupSettings ($where: GroupSettingWhereInput!) {
	groupSettings(where: $where) {
		edges {
			node {
				id
				joinPolicy
				syncToGithub
				syncToSlack
				visibility
				group {
					id
					name
				}
				createdAt
				createdBy
				updatedAt
				updatedBy
			}
		}
	}
}
mutation UpdateGroupSetting ($updateGroupSettingId: ID!, $input: UpdateGroupSettingInput!) {
	updateGroupSetting(id: $updateGroupSettingId, input: $input) {
		groupSetting {
			createdAt
			createdBy
			groupID
			id
			joinPolicy
			syncToGithub
			syncToSlack
			updatedAt
			updatedBy
			visibility
			group {
				id
				name
			}
		}
	}
}
