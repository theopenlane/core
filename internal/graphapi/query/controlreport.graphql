query GetAllControlReports {
  controlReports {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        id
        parentControlID
        refCode
        status
        referenceFramework
        category
        subcategory
        controlOwner {
          id
        }
        relatedControls {
          id
          refCode
          referenceFramework
          isSubcontrol
          parentControlID
          mappedControlReferenceIDs
          inheritedFromSubcontrolIDs
        }
        evidenceStatus {
          totalCount
          inheritedCount
          worstStatus
          approvedCount
          countByStatus {
            status
            totalCount
          }
        }
        linkedPolicies {
          totalCount
          internalPolicies {
            id
            name
            status
            inheritedFromIDs
          }
        }
        subcontrols {
          id
          refCode
          status
          referenceFramework
          parentControlID
          relatedControls {
            id
            refCode
            referenceFramework
            isSubcontrol
            parentControlID
            mappedControlReferenceIDs
          }
          evidenceStatus {
            totalCount
            inheritedCount
            worstStatus
          }
          linkedPolicies {
            totalCount
            internalPolicies {
              id
              name
              status
              inheritedFromIDs
            }
          }
        }
      }
    }
  }
}

query GetControlReports($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [ControlReportOrder!], $where: ControlWhereInput) {
  controlReports(
    first: $first
    last: $last
    after: $after
    before: $before
    orderBy: $orderBy
    where: $where
  ) {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        id
