}
query GetAllDirectoryMemberships {
	directoryMemberships {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				directoryAccountID
				directoryGroupID
				directorySyncRunID
				displayID
				firstSeenAt
				id
				integrationID
				lastConfirmedRunID
				lastSeenAt
				metadata
				observedAt
				ownerID
				role
				source
				updatedAt
				updatedBy
			}
		}
	}
}
