query GetDirectoryMemberships ($first: Int, $last: Int, $where: DirectoryMembershipWhereInput) {
	directoryMemberships(first: $first, last: $last, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				directoryAccountID
				directoryGroupID
				directorySyncRunID
				displayID
				firstSeenAt
				id
				integrationID
				lastConfirmedRunID
				lastSeenAt
				metadata
				observedAt
				ownerID
				role
				source
				updatedAt
				updatedBy
			}
		}
	}
}
