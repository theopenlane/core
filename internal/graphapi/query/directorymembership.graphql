mutation CreateBulkCSVDirectoryMembership ($input: Upload!) {
	createBulkCSVDirectoryMembership(input: $input) {
		directoryMemberships {
			addedAt
			createdAt
			createdBy
			directoryAccountID
			directoryGroupID
			directoryInstanceID
			directorySyncRunID
			displayID
			environmentID
			environmentName
			firstSeenAt
			id
			identityHolderID
			integrationID
			lastConfirmedRunID
			lastSeenAt
			metadata
			observedAt
			ownerID
			platformID
			removedAt
			role
			scopeID
			scopeName
			source
			updatedAt
			updatedBy
		}
	}
}
