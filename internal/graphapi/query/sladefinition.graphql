mutation CreateBulkCSVSLADefinition ($input: Upload!) {
	createBulkCSVSLADefinition(input: $input) {
		slaDefinitions {
			createdAt
			createdBy
			displayID
			id
			ownerID
			securityLevel
			slaDays
			tags
			updatedAt
			updatedBy
			updatedByImpersonator
		}
	}
}
mutation CreateBulkSLADefinition ($input: [CreateSLADefinitionInput!]) {
	createBulkSLADefinition(input: $input) {
		slaDefinitions {
			createdAt
			createdBy
			displayID
			id
			ownerID
			securityLevel
			slaDays
			tags
			updatedAt
			updatedBy
			updatedByImpersonator
		}
	}
}
mutation CreateSLADefinition ($input: CreateSLADefinitionInput!) {
	createSLADefinition(input: $input) {
		slaDefinition {
			createdAt
			createdBy
			displayID
			id
			ownerID
			securityLevel
			slaDays
			tags
			updatedAt
			updatedBy
			updatedByImpersonator
		}
	}
}
mutation DeleteBulkSLADefinition ($ids: [ID!]!) {
	deleteBulkSLADefinition(ids: $ids) {
		deletedIDs
	}
}
mutation DeleteSLADefinition ($deleteSLADefinitionId: ID!) {
	deleteSLADefinition(id: $deleteSLADefinitionId) {
		deletedID
	}
}
query GetAllSLADefinitions ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [SLADefinitionOrder!]) {
	slaDefinitions(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayID
				id
				ownerID
				securityLevel
				slaDays
				tags
				updatedAt
				updatedBy
				updatedByImpersonator
			}
		}
	}
}
query GetSLADefinitionByID ($slaDefinitionId: ID!) {
	slaDefinition(id: $slaDefinitionId) {
		createdAt
		createdBy
		displayID
		id
		ownerID
		securityLevel
		slaDays
		tags
		updatedAt
		updatedBy
		updatedByImpersonator
	}
}
query GetSLADefinitions ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [SLADefinitionOrder!], $where: SLADefinitionWhereInput) {
	slaDefinitions(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayID
				id
				ownerID
				securityLevel
				slaDays
				tags
				updatedAt
				updatedBy
				updatedByImpersonator
			}
		}
	}
}
