query GetSLADefinitions($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [SLADefinitionOrder!], $where: SLADefinitionWhereInput) {
  slaDefinitions(
      first: $first
      last: $last
      after: $after
      before: $before
      orderBy: $orderBy
      where: $where
    ) {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        createdAt
        createdBy
        displayID
        id
        ownerID
        slaDays
        slaDefinitionSeverityLevelID
        slaDefinitionSeverityLevelName
        tags
        updatedAt
        updatedBy
      }
    }
  }
}
