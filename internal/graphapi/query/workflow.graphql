query GetTaskWorkflowTimeline($taskId: ID!, $first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [WorkflowEventOrder!], $where: WorkflowEventWhereInput, $includeEmitFailures: Boolean) {
  task(id: $taskId) {
    id
    workflowTimeline(
      first: $first
      last: $last
      after: $after
      before: $before
      orderBy: $orderBy
      where: $where
      includeEmitFailures: $includeEmitFailures
    ) {
      totalCount
      pageInfo {
        startCursor
        endCursor
        hasPreviousPage
        hasNextPage
      }
      edges {
        node {
          createdAt
          createdBy
          displayID
          eventType
          id
          ownerID
          payload
          tags
          updatedAt
          updatedBy
          updatedByImpersonator
          workflowInstanceID
        }
      }
    }
  }
}

