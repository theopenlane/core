query GetAllEntities {
	entities {
		edges {
			node {
				createdAt
				createdBy
				description
				displayName
				status
				domains
				notes {
					edges {
						node {
							text
							updatedAt
							updatedBy
						}
					}
				}
				entityType {
					id
					name
				}
				id
				name
				ownerID
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
query GetEntities ($where: EntityWhereInput) {
	entities(where: $where) {
		edges {
			node {
				createdAt
				createdBy
				description
				displayName
				status
				domains
				notes {
					edges {
						node {
							text
							updatedAt
							updatedBy
						}
					}
				}
				entityType {
					id
					name
				}
				id
				name
				ownerID
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
