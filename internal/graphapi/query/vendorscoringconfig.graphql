query GetAllVendorScoringConfigs ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [VendorScoringConfigOrder!]) {
	vendorScoringConfigs(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				id
				ownerID
				questions
				riskThresholds
				scoringMode
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
