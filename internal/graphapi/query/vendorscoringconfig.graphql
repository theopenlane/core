mutation CreateBulkCSVVendorScoringConfig ($input: Upload!) {
	createBulkCSVVendorScoringConfig(input: $input) {
		vendorScoringConfigs {
			createdAt
			createdBy
			id
			ownerID
			questions
			riskThresholds
			scoringMode
			tags
			updatedAt
