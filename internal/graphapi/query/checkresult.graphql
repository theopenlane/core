mutation CreateBulkCSVCheckResult ($input: Upload!) {
	createBulkCSVCheckResult(input: $input) {
		checkResults {
			createdAt
			createdBy
			details
			externalURI
			id
			integrationID
			lastObservedAt
			parentExternalID
			source
			status
			tags
			updatedAt
			updatedBy
		}
	}
}
