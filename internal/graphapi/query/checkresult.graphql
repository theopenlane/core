mutation DeleteBulkCheckResult ($ids: [ID!]!) {
	deleteBulkCheckResult(ids: $ids) {
		deletedIDs
	}
}
mutation DeleteCheckResult ($deleteCheckResultId: ID!) {
	deleteCheckResult(id: $deleteCheckResultId) {
		deletedID
	}
}
query GetAllCheckResults ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [CheckResultOrder!]) {
	checkResults(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				details
				externalURI
				id
				integrationID
				lastObservedAt
				parentExternalID
				source
				status
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
query GetCheckResultByID ($checkResultId: ID!) {
	checkResult(id: $checkResultId) {
		createdAt
		createdBy
		details
		externalURI
		id
		integrationID
		lastObservedAt
		parentExternalID
		source
		status
		tags
		updatedAt
		updatedBy
	}
}
query GetCheckResults ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [CheckResultOrder!], $where: CheckResultWhereInput) {
	checkResults(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				details
				externalURI
				id
				integrationID
				lastObservedAt
				parentExternalID
				source
				status
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
