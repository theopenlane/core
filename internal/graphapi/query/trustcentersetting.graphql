mutation CreateTrustCenterSetting ($input: CreateTrustCenterSettingInput!, $logoFile: Upload, $logoFileMetadata: FileMetadataInput, $faviconFile: Upload, $faviconFileMetadata: FileMetadataInput) {
	createTrustCenterSetting(input: $input, logoFile: $logoFile, logoFileMetadata: $logoFileMetadata, faviconFile: $faviconFile, faviconFileMetadata: $faviconFileMetadata) {
		trustCenterSetting {
			accentColor
			backgroundColor
			companyDescription
			companyDomain
			companyName
			createdAt
			createdBy
			environment
			faviconLocalFileID
			faviconRemoteURL
			font
			foregroundColor
			heroImageLocalFileID
			id
			logoLocalFileID
			logoRemoteURL
			ndaApprovalRequired
			overview
			primaryColor
			removeBranding
			secondaryBackgroundColor
			secondaryForegroundColor
			securityContact
			statusPageURL
			themeMode
			title
			trustCenterID
			updatedAt
			updatedBy
			logoFile {
				id
				name
				metadata
				presignedURL
			}
			faviconFile {
				id
				name
				metadata
				presignedURL
			}
			heroImageFile {
				presignedURL
			}
		}
	}
}
mutation DeleteTrustCenterSetting ($deleteTrustCenterSettingId: ID!) {
	deleteTrustCenterSetting(id: $deleteTrustCenterSettingId) {
		deletedID
	}
}
query GetAllTrustCenterSettings {
	trustCenterSettings {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
