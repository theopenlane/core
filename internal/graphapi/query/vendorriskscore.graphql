	}
}
query GetAllVendorRiskScores ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [VendorRiskScoreOrder!]) {
	vendorRiskScores(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				answer
				answerType
				assessmentResponseID
				createdAt
				createdBy
				entityID
				id
				impact
				likelihood
				notes
				ownerID
				questionCategory
				questionDescription
				questionKey
				questionName
				score
				tags
				updatedAt
				updatedBy
				vendorScoringConfigID
			}
		}
	}
}
