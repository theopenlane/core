mutation CreateBulkCSVVendorRiskScore ($input: Upload!) {
	createBulkCSVVendorRiskScore(input: $input) {
		vendorRiskScores {
			answer
			answerType
			assessmentResponseID
			createdAt
			createdBy
			entityID
			id
			impact
			likelihood
			notes
			ownerID
			questionCategory
			questionDescription
			questionKey
			questionName
			score
			tags
			updatedAt
			updatedBy
			vendorScoringConfigID
		}
	}
}
