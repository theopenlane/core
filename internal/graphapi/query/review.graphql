mutation DeleteBulkReviewReview ($ids: [ID!]!) {
	deleteBulkReview(ids: $ids) {
		deletedIDs
	}
}
mutation DeleteReview ($deleteReviewId: ID!) {
	deleteReview(id: $deleteReviewId) {
		deletedID
	}
}
query GetAllReviews {
	reviews {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				approved
				approvedAt
				category
				classification
				createdAt
				createdBy
				details
				externalID
				externalOwnerID
				externalURI
				id
				metadata
				rawPayload
				reportedAt
				reporter
				reviewedAt
				reviewerID
				source
				state
				summary
				tags
				title
				updatedAt
				updatedBy
			}
		}
	}
}
