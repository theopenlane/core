mutation CreateBulkCSVReview ($input: Upload!) {
	createBulkCSVReview(input: $input) {
		reviews {
			approved
			approvedAt
			category
			classification
			createdAt
			createdBy
			details
			environmentID
			environmentName
			externalID
			externalOwnerID
			externalURI
			id
			internalNotes
			metadata
			ownerID
			rawPayload
			reportedAt
			reporter
			reviewedAt
			reviewerID
			scopeID
			scopeName
			source
			state
			status
			summary
			systemInternalID
			systemOwned
			tags
			title
			updatedAt
			updatedBy
			updatedByImpersonator
		}
	}
}
