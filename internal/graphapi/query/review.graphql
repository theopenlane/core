query GetReviews ($first: Int, $last: Int, $where: ReviewWhereInput) {
	reviews(first: $first, last: $last, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				approved
				approvedAt
				category
				classification
				createdAt
				createdBy
				details
				externalID
				externalOwnerID
				externalURI
				id
				metadata
				rawPayload
				reportedAt
				reporter
				reviewedAt
				reviewerID
				source
				state
				summary
				tags
				title
				updatedAt
				updatedBy
			}
		}
	}
}
