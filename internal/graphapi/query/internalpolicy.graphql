mutation CreateBulkCSVInternalPolicy ($input: Upload!) {
	createBulkCSVInternalPolicy(input: $input) {
		internalPolicies {
			approvalRequired
			approverID
			controlSuggestions
			createdAt
			createdBy
			delegateID
			details
			detailsJSON
			dismissedControlSuggestions
			dismissedImprovementSuggestions
			dismissedTagSuggestions
			displayID
			environmentID
			environmentName
			externalUUID
			fileID
			id
			improvementSuggestions
			internalNotes
			internalPolicyKindID
			internalPolicyKindName
			name
			ownerID
			reviewDue
			reviewFrequency
			revision
			scopeID
			scopeName
			status
			summary
			systemInternalID
			systemOwned
			tagSuggestions
			tags
			updatedAt
			updatedBy
			url
			workflowEligibleMarker
			approver {
				id
				name
			}
			delegate {
				id
				name
			}
		}
	}
}
