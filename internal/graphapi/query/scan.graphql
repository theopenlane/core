mutation CreateBulkCSVScan ($input: Upload!) {
	createBulkCSVScan(input: $input) {
		scans {
			assignedTo
			assignedToGroupID
			assignedToUserID
			createdAt
			createdBy
			environmentID
			environmentName
			generatedByPlatformID
			id
			metadata
			nextScanRunAt
			ownerID
			performedBy
			performedByGroupID
			performedByUserID
			reviewedBy
			reviewedByGroupID
			reviewedByUserID
			scanDate
			scanSchedule
			scanType
			scopeID
			scopeName
			status
			tags
			target
			updatedAt
			updatedBy
			vulnerabilityIds
		}
	}
}
