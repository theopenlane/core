query GetScans ($first: Int, $last: Int, $where: ScanWhereInput) {
	scans(first: $first, last: $last, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				id
				metadata
				ownerID
				scanType
				status
				tags
				target
				updatedAt
				updatedBy
			}
		}
	}
}
