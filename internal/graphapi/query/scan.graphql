mutation DeleteScan ($deleteScanId: ID!) {
	deleteScan(id: $deleteScanId) {
		deletedID
	}
}
query GetAllScans {
	scans {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				id
				metadata
				ownerID
				scanType
				status
				tags
				target
				updatedAt
				updatedBy
			}
		}
	}
}
query GetScanByID ($scanId: ID!) {
