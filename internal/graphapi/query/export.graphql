mutation CreateExport($input: CreateExportInput!) {
  createExport(input: $input) {
    export {
      createdAt
      createdBy
      exportType
      fileID
      id
      ownerID
      itemID
      requestorID
      status
      updatedAt
      updatedBy
    }
  }
}

query GetAllExports {
  exports {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        createdAt
        createdBy
        exportType
        fileID
        id
        ownerID
        requestorID
        itemID
        status
        updatedAt
        updatedBy
      }
    }
  }
}
query GetExportByID($exportId: ID!) {
  export(id: $exportId) {
    createdAt
    createdBy
    exportType
    fileID
    id
    ownerID
    requestorID
    status
    itemID
    updatedAt
    updatedBy
    files {
      edges {
        node {
          id
          storagePath
          storageScheme
          storageVolume
        }
      }
    }
    file {
      id
      storagePath
      storageScheme
      storageVolume
    }
  }
}

query GetExports($first: Int, $last: Int, $where: ExportWhereInput) {
  exports(first: $first, last: $last, where: $where) {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        createdAt
        createdBy
        exportType
        fileID
        id
        itemID
        ownerID
        requestorID
        status
        updatedAt
        updatedBy
      }
    }
  }
}
mutation UpdateExport($updateExportId: ID!, $input: UpdateExportInput!, $exportFiles: [Upload!]) {
  updateExport(id: $updateExportId, input: $input, exportFiles: $exportFiles) {
    export {
      createdAt
      createdBy
      exportType
      fileID
      id
      itemID
      ownerID
      requestorID
      status
      updatedAt
      updatedBy
      files {
        edges {
          node {
            id
            storagePath
            storageScheme
            storageVolume
          }
        }
      }
      file {
        id
        storagePath
        storageScheme
        storageVolume
      }
    }
  }
}
