mutation CreateBulkCSVDirectoryGroup ($input: Upload!) {
	createBulkCSVDirectoryGroup(input: $input) {
		directoryGroups {
			addedAt
			classification
			createdAt
			createdBy
			description
			directoryInstanceID
			directoryName
			directorySyncRunID
			displayID
			displayName
			email
			environmentID
			environmentName
			externalID
			externalSharingAllowed
			firstSeenAt
			id
			integrationID
			lastSeenAt
			memberCount
			metadata
			observedAt
			ownerID
			platformID
			profile
			profileHash
			rawProfileFileID
			removedAt
			scopeID
			scopeName
			sourceVersion
			status
			tags
			updatedAt
			updatedBy
			updatedByImpersonator
		}
	}
}
