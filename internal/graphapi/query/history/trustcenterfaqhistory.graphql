query GetAllTrustCenterFAQHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [TrustCenterFAQHistoryOrder!]) {
	trustCenterFAQHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayOrder
				historyTime
				id
				noteID
				operation
				ref
				referenceLink
				trustCenterFaqKindID
				trustCenterFaqKindName
				trustCenterID
				updatedAt
				updatedBy
			}
		}
	}
}
query GetTrustCenterFAQHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [TrustCenterFAQHistoryOrder!], $where: TrustCenterFAQHistoryWhereInput) {
	trustCenterFAQHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayOrder
				historyTime
				id
				noteID
				operation
				ref
				referenceLink
				trustCenterFaqKindID
				trustCenterFaqKindName
				trustCenterID
				updatedAt
				updatedBy
			}
		}
	}
}
