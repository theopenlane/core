query GetAllVendorRiskScoreHistories($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [VendorRiskScoreHistoryOrder!]) {
  vendorRiskScoreHistories(
    first: $first
    last: $last
    after: $after
    before: $before
    orderBy: $orderBy
  ) {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        answer
        answerType
        assessmentResponseID
        createdAt
        createdBy
        entityID
        historyTime
        id
        impact
        likelihood
        notes
        operation
        ownerID
        questionCategory
        questionDescription
        questionKey
        questionName
        ref
        score
        tags
        updatedAt
        updatedBy
        vendorScoringConfigID
      }
    }
  }
}

query GetVendorRiskScoreHistories($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [VendorRiskScoreHistoryOrder!], $where: VendorRiskScoreHistoryWhereInput) {
