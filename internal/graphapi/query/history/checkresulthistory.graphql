query GetAllCheckResultHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [CheckResultHistoryOrder!]) {
	checkResultHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				details
				externalURI
				historyTime
				id
				integrationID
				lastObservedAt
				operation
				parentExternalID
				ref
				source
				status
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
query GetCheckResultHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [CheckResultHistoryOrder!], $where: CheckResultHistoryWhereInput) {
	checkResultHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				details
				externalURI
				historyTime
				id
				integrationID
				lastObservedAt
				operation
				parentExternalID
				ref
				source
				status
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
