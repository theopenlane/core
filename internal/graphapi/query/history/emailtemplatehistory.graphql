query GetAllEmailTemplateHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [EmailTemplateHistoryOrder!]) {
	emailTemplateHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				active
				createdAt
				createdBy
				defaults
				description
				format
				historyTime
				id
				integrationID
				internalNotes
				key
				locale
				metadata
				name
				operation
				ownerID
				ref
				revision
				systemInternalID
				systemOwned
				templateContext
				updatedAt
				updatedBy
				version
				workflowDefinitionID
				workflowInstanceID
			}
		}
	}
}
query GetEmailTemplateHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [EmailTemplateHistoryOrder!], $where: EmailTemplateHistoryWhereInput) {
	emailTemplateHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
