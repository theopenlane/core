query GetAllSLADefinitionHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [SLADefinitionHistoryOrder!]) {
	slaDefinitionHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayID
				historyTime
				id
				operation
				ownerID
				ref
				securityLevel
				slaDays
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
query GetSLADefinitionHistories ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [SLADefinitionHistoryOrder!], $where: SLADefinitionHistoryWhereInput) {
	slaDefinitionHistories(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				createdAt
				createdBy
				displayID
				historyTime
				id
				operation
				ownerID
				ref
				securityLevel
				slaDays
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
