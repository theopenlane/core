query GetAllVendorScoringConfigHistories($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [VendorScoringConfigHistoryOrder!]) {
  vendorScoringConfigHistories(
    first: $first
    last: $last
    after: $after
    before: $before
    orderBy: $orderBy
  ) {
    totalCount
    pageInfo {
      startCursor
      endCursor
      hasPreviousPage
      hasNextPage
    }
    edges {
      node {
        createdAt
        createdBy
        historyTime
        id
        operation
        ownerID
        questions
        ref
        riskThresholds
        scoringMode
        tags
        updatedAt
        updatedBy
      }
    }
  }
}

