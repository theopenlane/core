}
query GetAllTasks ($first: Int, $last: Int, $after: Cursor, $before: Cursor, $orderBy: [TaskOrder!]) {
	tasks(first: $first, last: $last, after: $after, before: $before, orderBy: $orderBy) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				assigneeID
				assignerID
				completed
				createdAt
				createdBy
				details
				detailsJSON
				displayID
				due
				environmentID
				environmentName
				externalReferenceURL
				externalUUID
				id
				idempotencyKey
				ownerID
				parentTaskID
				scopeID
				scopeName
				status
				systemGenerated
				tags
				taskKindID
				taskKindName
				title
				updatedAt
				updatedBy
				assignee {
					id
					firstName
					lastName
				}
				assigner {
					id
					firstName
					lastName
				}
				owner {
					id
					name
				}
				comments {
					edges {
						node {
							id
							displayID
							text
							createdAt
							createdBy
							updatedAt
							updatedBy
							files {
								edges {
									node {
										id
										storagePath
										storageScheme
										storageVolume
									}
								}
							}
						}
					}
				}
			}
		}
	}
}
