mutation CreateBulkCSVTask ($input: Upload!) {
	createBulkCSVTask(input: $input) {
		tasks {
			assigneeID
			assignerID
			completed
			createdAt
			createdBy
			details
			detailsJSON
			displayID
			due
			environmentID
			environmentName
			externalReferenceURL
			externalUUID
			id
			idempotencyKey
			ownerID
			parentTaskID
			scopeID
			scopeName
			status
			systemGenerated
			tags
			taskKindID
			taskKindName
			title
			updatedAt
			updatedBy
			assignee {
				id
				firstName
				lastName
			}
			assigner {
				id
				firstName
				lastName
			}
			comments {
				edges {
					node {
						id
						displayID
						text
						createdAt
						createdBy
						updatedAt
						updatedBy
					}
				}
			}
		}
	}
}
