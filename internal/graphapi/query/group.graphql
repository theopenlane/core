mutation CreateBulkCSVGroup ($input: Upload!) {
	createBulkCSVGroup(input: $input) {
		groups {
			avatarLocalFileID
			createdAt
			createdBy
			description
			displayID
			displayName
			gravatarLogoURL
			id
			isManaged
			logoURL
			name
			oscalContactUuids
			oscalPartyUUID
			oscalRole
			ownerID
			scimActive
			scimDisplayName
			scimExternalID
			scimGroupMailing
			tags
			updatedAt
			updatedBy
			owner {
				id
				displayName
			}
			setting {
				id
				joinPolicy
				syncToGithub
				syncToSlack
				visibility
			}
			members {
				totalCount
				edges {
					node {
						id
						role
						user {
							id
							firstName
							lastName
						}
					}
				}
			}
		}
	}
}
