mutation CreateGroup ($input: CreateGroupInput!) {
	createGroup(input: $input) {
		group {
			avatarLocalFileID
			createdAt
			createdBy
			description
			displayID
			displayName
			gravatarLogoURL
			id
			isManaged
			logoURL
			name
			oscalContactUuids
			oscalPartyUUID
			oscalRole
			ownerID
			scimActive
			scimDisplayName
			scimExternalID
			scimGroupMailing
			tags
			updatedAt
			updatedBy
			owner {
				id
				displayName
			}
			setting {
				id
				joinPolicy
				syncToGithub
				syncToSlack
				visibility
