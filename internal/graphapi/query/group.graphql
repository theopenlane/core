query GetGroupInfo ($where: GroupWhereInput) {
	groups(where: $where) {
		edges {
			node {
				description
				displayName
				id
				logoURL
				name
				tags
				isManaged
				setting {
					createdAt
					createdBy
					id
					joinPolicy
					syncToGithub
