mutation CreateGroupByClone ($groupInput: CreateGroupInput!, $inheritGroupPermissions: ID, $cloneGroupMembers: ID) {
	createGroupByClone(groupInput: $groupInput, inheritGroupPermissions: $inheritGroupPermissions, cloneGroupMembers: $cloneGroupMembers) {
		group {
			id
			displayID
			members {
				edges {
					node {
						id
						user {
							firstName
							lastName
						}
					}
				}
			}
			permissions {
				edges {
					node {
						displayID
						id
						name
						objectType
						permissions
					}
				}
			}
		}
	}
}
mutation CreateGroupWithMembers ($groupInput: CreateGroupInput!, $members: [GroupMembersInput!]) {
	createGroupWithMembers(groupInput: $groupInput, members: $members) {
		group {
			id
			displayID
			name
			setting {
				visibility
			}
			members {
				edges {
					node {
						id
						role
						user {
							id
							firstName
							lastName
						}
					}
				}
			}
		}
	}
}
mutation DeleteGroup ($deleteGroupId: ID!) {
	deleteGroup(id: $deleteGroupId) {
		deletedID
	}
}
query GetAllGroups {
	groups {
		edges {
			node {
				description
				displayName
				id
				logoURL
				name
				tags
				isManaged
				owner {
					id
					displayName
				}
				setting {
					createdAt
					createdBy
					id
					joinPolicy
					syncToGithub
					syncToSlack
					updatedAt
					updatedBy
					visibility
				}
				members {
					totalCount
					edges {
						node {
							id
							role
							user {
								id
								firstName
								lastName
							}
						}
					}
				}
				createdAt
				createdBy
				updatedAt
				updatedBy
			}
		}
	}
}
