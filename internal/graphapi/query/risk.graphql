mutation CreateBulkCSVRisk ($input: Upload!) {
	createBulkCSVRisk(input: $input) {
		risks {
			businessCosts
			businessCostsJSON
			createdAt
			createdBy
			delegateID
			details
			detailsJSON
			displayID
			environmentID
			environmentName
			externalID
			externalUUID
			id
			impact
			integrationID
			likelihood
			mitigation
			mitigationJSON
			name
			observedAt
			ownerID
			riskCategoryID
			riskCategoryName
			riskKindID
			riskKindName
			scopeID
			scopeName
			score
			stakeholderID
			status
			tags
			updatedAt
			updatedBy
			stakeholder {
