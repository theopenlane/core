mutation CreateBulkCSVSubcontrol ($input: Upload!) {
	createBulkCSVSubcontrol(input: $input) {
		subcontrols {
			aliases
			assessmentMethods
			assessmentObjectives
			auditorReferenceID
			category
			categoryID
			controlID
			controlOwnerID
			controlQuestions
			createdAt
			createdBy
			delegateID
			description
			descriptionJSON
			displayID
			evidenceRequests
			exampleEvidence
			externalUUID
			id
			implementationDescription
			implementationGuidance
			implementationStatus
			internalNotes
			mappedCategories
			ownerID
			publicRepresentation
			refCode
			referenceFramework
			referenceFrameworkRevision
			referenceID
			references
			responsiblePartyID
			source
			sourceName
			status
			subcategory
			subcontrolKindID
			subcontrolKindName
			systemInternalID
			systemOwned
			tags
			testingProcedures
			title
			updatedAt
			updatedBy
			workflowEligibleMarker
			controlOwner {
				id
				name
			}
			delegate {
				id
				name
			}
		}
	}
}
