query GetActionPlans ($where: ActionPlanWhereInput) {
	actionPlans(where: $where) {
		edges {
			node {
				approvalRequired
				createdAt
				createdBy
				details
				dueDate
				id
				name
				priority
				reviewDue
				reviewFrequency
				revision
				source
				status
				tags
				updatedAt
				updatedBy
			}
		}
	}
}
