mutation CreateActionPlan ($input: CreateActionPlanInput!) {
	createActionPlan(input: $input) {
		actionPlan {
			actionPlanKindID
			actionPlanKindName
			approvalRequired
			approverID
			blocked
			blockerReason
			completedAt
			controlSuggestions
			createdAt
			createdBy
			delegateID
			description
			details
			detailsJSON
			dismissedControlSuggestions
			dismissedImprovementSuggestions
			dismissedTagSuggestions
			dueDate
			fileID
			id
			improvementSuggestions
			internalNotes
			metadata
			name
			ownerID
			priority
			rawPayload
			requiresApproval
			reviewDue
			reviewFrequency
			revision
			source
			status
			summary
			systemInternalID
			systemOwned
			tagSuggestions
			tags
			title
			updatedAt
			updatedBy
			url
			workflowEligibleMarker
		}
	}
}
