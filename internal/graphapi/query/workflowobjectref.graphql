query GetAllWorkflowObjectRefs {
	workflowObjectRefs {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				controlID
				createdAt
				createdBy
				directoryAccountID
				directoryGroupID
				directoryMembershipID
				displayID
				findingID
				id
				internalPolicyID
				ownerID
				taskID
				updatedAt
				updatedBy
				workflowInstanceID
			}
		}
	}
}
query GetWorkflowObjectRefByID ($workflowObjectRefId: ID!) {
	workflowObjectRef(id: $workflowObjectRefId) {
		actionPlanID
		campaignID
		campaignTargetID
		controlID
		createdAt
		createdBy
		directoryAccountID
		directoryGroupID
		directoryMembershipID
		displayID
		evidenceID
		findingID
		id
		identityHolderID
		internalPolicyID
		ownerID
		platformID
		procedureID
		subcontrolID
		taskID
		updatedAt
		updatedBy
		workflowInstanceID
	}
}
query GetWorkflowObjectRefs ($first: Int, $last: Int, $where: WorkflowObjectRefWhereInput) {
	workflowObjectRefs(first: $first, last: $last, where: $where) {
		totalCount
		pageInfo {
			startCursor
			endCursor
			hasPreviousPage
			hasNextPage
		}
		edges {
			node {
				controlID
				createdAt
				createdBy
				directoryAccountID
				directoryGroupID
				directoryMembershipID
				displayID
				findingID
				id
				internalPolicyID
				ownerID
				taskID
				updatedAt
				updatedBy
				workflowInstanceID
			}
		}
	}
}
