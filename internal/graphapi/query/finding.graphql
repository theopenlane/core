mutation CreateBulkCSVFinding ($input: Upload!) {
	createBulkCSVFinding(input: $input) {
		findings {
			assessmentID
			blocksProduction
			categories
			category
			createdAt
			createdBy
			description
			displayID
			displayName
			environmentID
			environmentName
			eventTime
			exploitability
			externalID
			externalOwnerID
			externalURI
			findingClass
			findingStatusID
			findingStatusName
			id
			impact
			internalNotes
			metadata
			numericSeverity
			open
			ownerID
			priority
			production
			public
			rawPayload
			recommendation
			recommendedActions
			references
			remediationSLA
			reportedAt
			resourceName
			scopeID
			scopeName
			score
			securityLevel
			severity
			source
			sourceUpdatedAt
			state
			status
			stepsToReproduce
			systemInternalID
			systemOwned
			tags
			targetDetails
			targets
			updatedAt
			updatedBy
			validated
			vector
		}
	}
}
